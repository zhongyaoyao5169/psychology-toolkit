<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>答题记录 · 知识测评</title>
<style>
:root{
  --bg:#FAF7F0;--ink:#2B2622;--muted:#9A9388;--line:#E5DFD3;--card:#FFFFFF;
  --chip-bg:#F1ECE1;--accent:#3AA984;--accent-soft:#E8F5F0;
  --wrong:#E2566B;--wrong-soft:#FCEEF0;
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;
  font-family:"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--ink);
}
.header{
  padding:18px 24px 12px;border-bottom:1px solid var(--line);background:var(--bg);
}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.header h1{margin:0;font-size:18px;line-height:1.4}
.header p{margin:4px 0 0;font-size:12px;color:var(--muted)}
.back-link{font-size:13px;color:var(--muted);text-decoration:none;flex-shrink:0;padding-top:2px}
.back-link:hover{color:var(--ink)}
.main{max-width:760px;margin:0 auto;padding:20px 24px 48px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;
  font-family:inherit;text-decoration:none;cursor:pointer;border:none;
  transition:background .15s;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#329A76}
.btn-secondary{background:var(--chip-bg);color:var(--ink)}
.btn-secondary:hover{background:#E5DF0}
.not-found{padding:40px 20px;text-align:center;color:var(--muted);background:var(--card);
  border:1px solid var(--line);border-radius:12px}
</style>
<link rel="stylesheet" href="review.css">
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <h1 id="pageTitle">答题记录</h1>
      <p id="pageSubtitle"></p>
    </div>
    <a class="back-link" href="index.html">← 返回列表</a>
  </div>
</div>
<main class="main" id="main"></main>
<script src="data/weekly.js"></script>
<script src="data/classroom.js"></script>
<script src="review.js"></script>
<script>
(function () {
  const HISTORY_KEY = "psych-assessment-history";
  const params = new URLSearchParams(location.search);
  const examId = params.get("exam");
  const recordId = params.get("record");
  const exams = (window.WEEKLY_EXAMS || []).concat(window.CLASSROOM_EXAMS || []);
  const exam = exams.find(function (e) { return e.id === examId; });
  const mainEl = document.getElementById("main");
  const R = window.QuizReview;

  function loadHistory() {
    try {
      return JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}");
    } catch (e) {
      return {};
    }
  }

  if (!exam || !recordId) {
    mainEl.innerHTML = '<div class="not-found">记录不存在，请从<a href="index.html">测评列表</a>的答题记录进入。</div>';
    return;
  }

  const records = (loadHistory()[examId] || []);
  const record = records.find(function (r) {
    return r.id === recordId || String(r.timestamp) === recordId;
  });

  if (!record) {
    mainEl.innerHTML = '<div class="not-found">找不到该次答题记录，可能已被清空。<br><br><a href="index.html">返回列表</a></div>';
    return;
  }

  document.title = exam.title + " · 答题记录";
  document.getElementById("pageTitle").textContent = exam.title;
  document.getElementById("pageSubtitle").textContent = "历史记录 · " + R.formatDateTime(record.timestamp);

  mainEl.innerHTML = R.renderSnapshot(exam, record, {
    title: "历史答题记录",
    actionsHtml:
      '<div class="result-actions">' +
      '<a class="btn btn-primary" href="quiz.html?id=' + encodeURIComponent(examId) + '">再做一次</a>' +
      '<a class="btn btn-secondary" href="index.html">返回列表</a>' +
      "</div>",
  });
})();
</script>
</body>
</html>
