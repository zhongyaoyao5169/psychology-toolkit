<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>心理学统计数理</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #FAF7F0;
      --ink: #2B2622;
      --muted: #9A9388;
      --line: #E5DFD3;
      --card: #FFFFFF;
      --chip-bg: #F1ECE1;
      --accent-mentor: #7C7AE0;
      --accent-rupture: #E2566B;
      --accent-inspire: #3AA984;

      --bg-page: var(--bg);
      --bg-surface: var(--bg);
      --bg-elevated: var(--card);
      --text-primary: var(--ink);
      --text-secondary: var(--muted);
      --text-tertiary: var(--muted);
      --text-brand: var(--ink);
      --border-default: var(--line);
      --border-subtle: var(--line);
      --interactive-primary-bg: var(--ink);
      --interactive-primary-text: var(--card);

      --spacing-2: 8px;
      --spacing-3: 12px;
      --spacing-4: 16px;
      --spacing-5: 20px;
      --spacing-6: 24px;
      --spacing-8: 32px;

      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 14px;
      --radius-pill: 999px;

      --font-family: "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-heading-1: 700 21px/1.3 var(--font-family);
      --font-heading-2: 700 18px/1.35 var(--font-family);
      --font-body: 400 15px/1.6 var(--font-family);
      --font-body-sm: 400 13px/1.65 var(--font-family);
      --font-caption: 400 12px/1.4 var(--font-family);

      --duration-fast: 150ms;
      --easing-default: ease;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font: var(--font-body);
      background: var(--bg-page);
      color: var(--text-primary);
    }

    header {
      background: var(--bg);
      color: var(--ink);
      padding: 20px 32px 16px;
      border-bottom: 1px solid var(--line);
    }

    header h1 {
      margin: 0 0 6px;
      font: var(--font-heading-1);
    }

    header p {
      margin: 0;
      font: var(--font-body-sm);
      color: var(--muted);
      max-width: 720px;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-body {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg);
      border-right: 1px solid var(--line);
      padding: 16px 12px;
      overflow-y: auto;
    }

    .sidebar-label {
      margin: 0 0 10px;
      padding: 0 4px;
      font: 600 11px/1 var(--font-family);
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .nav-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--card);
      color: var(--ink);
      cursor: pointer;
      font: 500 13px/1.45 var(--font-family);
      transition: border-color var(--duration-fast) var(--easing-default),
                  background var(--duration-fast) var(--easing-default);
    }

    .nav-item:hover:not(:disabled) {
      border-color: var(--ink);
    }

    .nav-item.active {
      border-color: var(--ink);
      background: var(--chip-bg);
      font-weight: 700;
    }

    .nav-item:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      color: var(--muted);
    }

    .nav-item.placeholder {
      min-height: 42px;
    }

    main {
      flex: 1;
      min-width: 0;
      overflow: auto;
      padding: 24px 32px 40px;
    }

    .view-panel {
      display: none;
    }

    .view-panel.active {
      display: block;
    }

    .view-head {
      margin-bottom: var(--spacing-4);
    }

    .view-head h2 {
      margin: 0 0 6px;
      font: var(--font-heading-2);
    }

    .view-head p {
      margin: 0;
      font: var(--font-body-sm);
      color: var(--muted);
    }

    .placeholder-card {
      background: var(--card);
      border: 1px dashed var(--line);
      border-radius: var(--radius-lg);
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
      font: var(--font-body-sm);
    }

    .placeholder-card strong {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font: var(--font-heading-2);
    }

    .tabs {
      display: flex;
      gap: var(--spacing-2);
      flex-wrap: wrap;
      margin-bottom: var(--spacing-4);
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--card);
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      cursor: pointer;
      font: 500 13px/1 var(--font-family);
      color: var(--ink);
      transition: background var(--duration-fast) var(--easing-default),
                  color var(--duration-fast) var(--easing-default),
                  border-color var(--duration-fast) var(--easing-default);
    }

    .tab:hover {
      border-color: var(--ink);
    }

    .tab.active {
      background: var(--ink);
      color: var(--card);
      border-color: var(--ink);
    }

    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: var(--spacing-5);
      margin-bottom: var(--spacing-6);
    }

    .card h2 {
      margin: 0 0 var(--spacing-4);
      font: var(--font-heading-2);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: var(--spacing-4);
      align-items: end;
    }

    label {
      display: block;
      font: 600 14px/1.4 var(--font-family);
      margin-bottom: var(--spacing-2);
      color: var(--text-primary);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--ink);
    }

    .value {
      color: var(--ink);
      font-weight: 700;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: var(--spacing-3);
      margin-top: var(--spacing-4);
    }

    .stat {
      background: var(--chip-bg);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: var(--spacing-3) var(--spacing-4);
    }

    .stat small {
      display: block;
      font: var(--font-caption);
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .stat strong {
      font: 600 18px/1.2 var(--font-family);
      color: var(--text-primary);
    }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .chart-panel {
      padding: var(--spacing-4);
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .chart-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 32px;
      padding: 0 0 10px;
    }

    .chart-head h3 {
      margin: 0;
      font: 700 15px/1.4 var(--font-family);
      color: var(--ink);
      flex: 1;
      min-width: 0;
    }

    .chart-legend {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      font: 400 12px/1.4 var(--font-family);
      color: var(--muted);
    }

    .chart-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .legend-line {
      display: inline-block;
      width: 20px;
      border-top: 2px solid currentColor;
    }

    .legend-line.dashed {
      border-top-style: dashed;
      color: var(--muted);
    }

    .chart-panel + .chart-panel {
      border-left: 1px solid var(--border-default);
    }

    .chart {
      min-height: 494px;
      height: 494px;
    }

    .card-charts {
      padding: 0;
      overflow: hidden;
    }

    .formula {
      background: var(--chip-bg);
      color: var(--ink);
      padding: var(--spacing-4);
      border-radius: var(--radius-md);
      font: 500 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
      margin-top: var(--spacing-3);
      border: 1px solid var(--line);
    }

    .gif-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--spacing-4);
    }

    .gif-grid figure {
      margin: 0;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: var(--spacing-3);
    }

    .gif-grid img {
      width: 100%;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: var(--bg-elevated);
      display: block;
    }

    .gif-grid figcaption {
      margin-top: var(--spacing-2);
      font: var(--font-caption);
      color: var(--text-secondary);
      text-align: center;
    }

    @media (max-width: 900px) {
      .charts { grid-template-columns: 1fr; }
      .chart-panel + .chart-panel {
        border-left: none;
        border-top: 1px solid var(--border-default);
      }
      .app-body { flex-direction: column; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--line);
        padding: 12px 16px;
      }
      .sidebar-nav {
        flex-direction: row;
        flex-wrap: wrap;
      }
      .nav-item { width: auto; flex: 1 1 160px; }
      main { padding: var(--spacing-4); }
      header { padding: var(--spacing-4); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header>
      <h1>心理学统计数理</h1>
      <p>公式图解与数据计算可视化，左侧目录切换不同主题。</p>
    </header>

    <div class="app-body">
      <aside class="sidebar">
        <p class="sidebar-label">目录</p>
        <nav class="sidebar-nav" id="sidebarNav">
          <button type="button" class="nav-item active" data-view="linear-transform">方差、标准差的线性变换</button>
          <button type="button" class="nav-item placeholder" disabled>更多公式图解 · 即将上线</button>
          <button type="button" class="nav-item placeholder" disabled>更多公式图解 · 即将上线</button>
          <button type="button" class="nav-item placeholder" disabled>更多公式图解 · 即将上线</button>
        </nav>
      </aside>

      <main>
        <div id="view-linear-transform" class="view-panel active">
          <div class="view-head">
            <h2>方差、标准差的线性变换</h2>
            <p>四种变换：X + C · X × D · X×D + C · (X + C)×D</p>
          </div>

    <div class="tabs">
      <button class="tab active" data-mode="add">① 平移 X + C</button>
      <button class="tab" data-mode="mul">② 拉伸 X × D</button>
      <button class="tab" data-mode="comb">③ 先乘后加 X×D + C</button>
      <button class="tab" data-mode="comb2">④ 先加后乘 (X + C)×D</button>
    </div>

    <section class="card">
      <div class="controls">
        <div id="control-c">
          <label>常数 C = <span class="value" id="c-val">0</span></label>
          <input id="slider-c" type="range" min="0" max="100" step="2" value="0" />
        </div>
        <div id="control-d">
          <label>常数 D = <span class="value" id="d-val">0.50</span></label>
          <input id="slider-d" type="range" min="0.5" max="3" step="0.05" value="0.5" />
        </div>
        <div id="control-frame" style="display:none">
          <label>
            变换进度（帧 <span class="value" id="frame-val">0</span>/50）
            · C = <span class="value" id="frame-c">0</span>
            · D = <span class="value" id="frame-d">0.50</span>
          </label>
          <input id="slider-frame" type="range" min="0" max="50" step="1" value="0" />
        </div>
      </div>
      <div class="formula" id="formula">Y = X + 0</div>
      <div class="stats">
        <div class="stat"><small>均值</small><strong id="stat-mean">—</strong></div>
        <div class="stat"><small>标准差</small><strong id="stat-std">—</strong></div>
        <div class="stat"><small>方差</small><strong id="stat-var">—</strong></div>
        <div class="stat"><small>规律提示</small><strong id="stat-tip" style="font-size:0.95rem;">—</strong></div>
      </div>
    </section>

    <section class="card card-charts">
      <div class="charts">
        <div class="chart-panel">
          <div class="chart-head">
            <h3 id="box-chart-title">箱线图</h3>
          </div>
          <div id="box-chart" class="chart"></div>
        </div>
        <div class="chart-panel">
          <div class="chart-head">
            <h3 id="kde-chart-title">核密度曲线</h3>
            <div class="chart-legend">
              <span><i class="legend-line" id="legend-transformed"></i>变换后</span>
              <span><i class="legend-line dashed"></i>原始分布</span>
            </div>
          </div>
          <div id="kde-chart" class="chart"></div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2>预生成动画 GIF</h2>
      <div class="gif-grid">
        <figure>
          <img src="../平移动画_加常数C.gif" alt="平移动画" />
          <figcaption>平移：加常数 C</figcaption>
        </figure>
        <figure>
          <img src="../拉伸动画_乘常数D.gif" alt="拉伸动画" />
          <figcaption>拉伸：乘常数 D</figcaption>
        </figure>
        <figure>
          <img src="../组合变换_先乘后加_X乘D加C.gif" alt="先乘后加" />
          <figcaption>③ 先乘后加：Y = X×D + C</figcaption>
        </figure>
        <figure>
          <img src="../组合变换_先加后乘_X加C乘D.gif" alt="先加后乘" />
          <figcaption>④ 先加后乘：Y = (X + C)×D</figcaption>
        </figure>
      </div>
    </section>
        </div>
      </main>
    </div>
  </div>

  <script>
    function initSidebarNav() {
      document.querySelectorAll(".nav-item:not(:disabled)").forEach(btn => {
        btn.addEventListener("click", () => {
          const viewId = btn.dataset.view;
          if (!viewId) return;
          document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          document.querySelectorAll(".view-panel").forEach(p => p.classList.remove("active"));
          const panel = document.getElementById("view-" + viewId);
          if (panel) panel.classList.add("active");
          if (viewId === "linear-transform") {
            requestAnimationFrame(() => {
              ["box-chart", "kde-chart"].forEach(id => {
                const el = document.getElementById(id);
                if (el && el.data) Plotly.Plots.resize(el);
              });
              render();
            });
          }
        });
      });
    }

    let mode = "add";

    // 与 generate_transform_gifs.py 完全一致的参数与坐标轴
    const MODE_CONFIG = {
      add: {
        xRange: [0, 160],
        kdeYRange: [0, 0.06],
        showOriginal: true,
        getParams() {
          const c = Number(document.getElementById("slider-c").value);
          return { c, d: 1, frame: c / 2 };
        },
      },
      mul: {
        xRange: [-30, 180],
        kdeYRange: [0, 0.08],
        showOriginal: true,
        getParams() {

          return { c: frame * 1.5, d: 0.5 + frame * 0.04, frame };

      },
      comb2: {
        xRange: [-30, 280],
        kdeYRange: [0, 0.08],
        showOriginal: true,
        getParams() {
          const frame = Number(document.getElementById("slider-frame").value);
          return { c: frame * 1.5, d: 0.5 + frame * 0.04, frame };
        },
      },
    };

    function updateControls() {
      const cfg = MODE_CONFIG[mode];
      document.getElementById("control-c").style.display = mode === "add" ? "block" : "none";
      document.getElementById("control-d").style.display = mode === "mul" ? "block" : "none";
      document.getElementById("control-frame").style.display =
        mode === "comb" || mode === "comb2" ? "block" : "none";
    }

    function resetSlidersForMode() {
      if (mode === "add") {
        document.getElementById("slider-c").value = "0";
      } else if (mode === "mul") {
        document.getElementById("slider-d").value = "0.5";
      } else {
        document.getElementById("slider-frame").value = "0";
      }
    }

    function mean(arr) {
      return arr.reduce((a, b) => a + b, 0) / arr.length;
    }

    function std(arr) {
      const m = mean(arr);
      return Math.sqrt(arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length);
    }

    function varp(arr) {
      const m = mean(arr);
      return arr.reduce((s, v) => s + (v - m) ** 2, 0) / arr.length;
    }

    function transform(c, d) {
      if (mode === "add") return X.map(v => v + c);
      if (mode === "mul") return X.map(v => v * d);
      if (mode === "comb") return X.map(v => v * d + c);
      return X.map(v => (v + c) * d);
    }
    function modeColor() {
      if (mode === "add") return "#4A90D9";
      if (mode === "mul") return "#3AA984";
      if (mode === "comb") return "#7C7AE0";
      return "#E2566B";
    }

    function modeBoxColor() {
      if (mode === "add") return "#E3F0FB";
      if (mode === "mul") return "#E8F5EF";
      if (mode === "comb") return "#EEEEF8";
      return "#FCEEF0";
    }

    function hexToRgba(hex, alpha) {
      const h = hex.replace("#", "");
      const r = parseInt(h.slice(0, 2), 16);
      const g = parseInt(h.slice(2, 4), 16);
      const b = parseInt(h.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    const PLOT_FONT = '"Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif';
    const PLOT_GRID = "#E5DFD3";
    const PLOT_MUTED = "#9A9388";
    const PLOT_MEAN = "#E2566B";
    const PLOT_STD = "#7C7AE0";

    const CHART_MARGIN = { t: 16, r: 24, b: 68, l: 64 };

    function baseLayout() {
      return {
        paper_bgcolor: "#FAF7F0",
        plot_bgcolor: "#FAF7F0",
        font: { family: PLOT_FONT, color: "#2B2622", size: 13 },
        margin: CHART_MARGIN,
        autosize: true,
      };
    }

    function xaxisConfig(xMin, xMax) {
      return {
        title: { text: "数值", standoff: 10, font: { size: 13, color: "#2B2622", family: PLOT_FONT } },
        range: [xMin, xMax],
        gridcolor: PLOT_GRID,
        linecolor: PLOT_GRID,
        zerolinecolor: PLOT_GRID,
      };
    }

    function kde(values, points = 200) {
      const n = values.length;
      const sd = std(values) || 1;
      const bandwidth = 1.06 * sd * Math.pow(n, -0.2);
      const min = Math.min(...values) - 4 * bandwidth;
      const max = Math.max(...values) + 4 * bandwidth;
      const xs = Array.from({ length: points }, (_, i) => min + (max - min) * i / (points - 1));
      const coeff = 1 / (n * bandwidth * Math.sqrt(2 * Math.PI));
      const ys = xs.map(x => {
        let sum = 0;
        for (const v of values) {
          const z = (x - v) / bandwidth;
          sum += Math.exp(-0.5 * z * z);
        }
        return coeff * sum;
      });
      return { xs, ys };
    }

    function render() {
      const cfg = MODE_CONFIG[mode];
      const { c, d, frame } = cfg.getParams();
      const Y = transform(c, d);
      const m = mean(Y);
      const s = std(Y);
      const v = varp(Y);
      const [xMin, xMax] = cfg.xRange;
      const [yMin, yMax] = cfg.kdeYRange;

      document.getElementById("c-val").textContent = c.toFixed(0);
      document.getElementById("d-val").textContent = d.toFixed(2);
      document.getElementById("frame-val").textContent = String(Math.round(frame));
      document.getElementById("frame-c").textContent = c.toFixed(0);
      document.getElementById("frame-d").textContent = d.toFixed(2);
      document.getElementById("stat-mean").textContent = m.toFixed(1);
      document.getElementById("stat-std").textContent = s.toFixed(1);
      document.getElementById("stat-var").textContent = v.toFixed(1);

      if (mode === "add") {
        document.getElementById("formula").textContent = `Y = X + ${c.toFixed(0)}`;
        document.getElementById("stat-tip").textContent = "均值 +C，标准差与方差不变";
      } else if (mode === "mul") {
        document.getElementById("formula").textContent = `Y = X × ${d.toFixed(2)}`;
        document.getElementById("stat-tip").textContent = "均值、标准差 ×D，方差 ×D²";
      } else if (mode === "comb") {
        document.getElementById("formula").textContent = `Y = X × ${d.toFixed(2)} + ${c.toFixed(0)}`;
        document.getElementById("stat-tip").textContent = "C 与 D 同步变化（与 GIF 一致）";
      } else {
        document.getElementById("formula").textContent = `Y = (X + ${c.toFixed(0)}) × ${d.toFixed(2)}`;
        document.getElementById("stat-tip").textContent = "C 与 D 同步变化（与 GIF 一致）";
      }

      const color = modeColor();
      const fill = modeBoxColor();

      const boxTitle = `箱线图 · 均值 ${m.toFixed(1)}  标准差 ${s.toFixed(1)}  方差 ${v.toFixed(1)}`;
      const kdeTitle = mode === "add"
        ? "核密度曲线（形状完全不变）"
        : mode === "mul"
          ? "核密度曲线（形状拉伸/压缩）"
          : mode === "comb"
            ? "先乘后加：X×D + C"
            : "先加后乘：(X + C) × D";

      document.getElementById("box-chart-title").textContent = boxTitle;
      document.getElementById("kde-chart-title").textContent = kdeTitle;
      document.getElementById("legend-transformed").style.color = color;

      const boxTrace = {
        type: "box",
        orientation: "h",
        x: Y,
        name: "变换后",
        boxpoints: false,
        fillcolor: fill,
        line: { color, width: 1.5 },
        whiskerwidth: 0.6,
        showlegend: false,
      };

      const boxLayout = {
        ...baseLayout(),
        xaxis: xaxisConfig(xMin, xMax),
        yaxis: {
          showticklabels: false,
          gridcolor: PLOT_GRID,
          linecolor: PLOT_GRID,
          zeroline: false,
        },
        shapes: [
          {
            type: "line",
            xref: "x",
            yref: "paper",
            x0: m,
            x1: m,
            y0: 0,
            y1: 1,
            line: { color: PLOT_MEAN, dash: "dash", width: 2 },
          },
          {
            type: "line",
            xref: "x",
            yref: "paper",
            x0: m - s,
            x1: m - s,
            y0: 0,
            y1: 1,
            line: { color: PLOT_STD, dash: "dot", width: 1.5 },
          },
          {
            type: "line",
            xref: "x",
            yref: "paper",
            x0: m + s,
            x1: m + s,
            y0: 0,
            y1: 1,
            line: { color: PLOT_STD, dash: "dot", width: 1.5 },
          },
        ],
        showlegend: false,
      };

      Plotly.react("box-chart", [boxTrace], boxLayout, { responsive: true, displayModeBar: false });

      const { xs, ys } = kde(Y);
      const kdeTraces = [{
        x: xs,
        y: ys,
        type: "scatter",
        mode: "lines",
        fill: "tozeroy",
        name: "变换后",
        line: { color, width: 2, shape: "spline" },
        fillcolor: hexToRgba(color, 0.35),
        hoverinfo: "skip",
      }];

      if (cfg.showOriginal) {
        const orig = kde(X);
        kdeTraces.push({
          x: orig.xs,
          y: orig.ys,
          type: "scatter",
          mode: "lines",
          name: "原始分布",
          line: { color: PLOT_MUTED, dash: "dash", width: 1.5, shape: "spline" },
          hoverinfo: "skip",
        });
      }

      const kdeLayout = {
        ...baseLayout(),
        xaxis: xaxisConfig(xMin, xMax),
        yaxis: {
          title: "密度",
          range: [yMin, yMax],
          gridcolor: PLOT_GRID,
          linecolor: PLOT_GRID,
          zerolinecolor: PLOT_GRID,
        },
        shapes: [{
          type: "line",
          xref: "x",
          yref: "y",
          x0: m,
          x1: m,
          y0: yMin,
          y1: yMax,
          line: { color: PLOT_MEAN, dash: "dash", width: 2 },
        }],
        showlegend: false,
      };

      Plotly.react("kde-chart", kdeTraces, kdeLayout, { responsive: true, displayModeBar: false });
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        mode = btn.dataset.mode;
        resetSlidersForMode();
        updateControls();
        render();
      });
    });

    document.getElementById("slider-c").addEventListener("input", render);
    document.getElementById("slider-d").addEventListener("input", render);
    document.getElementById("slider-frame").addEventListener("input", render);
    initSidebarNav();
    updateControls();
    render();
  </script>
</body>
</html>
