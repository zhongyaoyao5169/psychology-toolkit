<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">

<style>
  .bg { fill: #FAF7F0; }
  .frame { fill: #FFFFFF; stroke: #E5DFD3; stroke-width: 2; }
  .ink { fill: #2B2622; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .muted { fill: #9A9388; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .accent { fill: #7C7AE0; }
  .accent2 { fill: #3AA984; }
  .accent3 { fill: #E2566B; }
  .line { stroke: #2B2622; stroke-width: 2; fill: none; }
  .dash { stroke: #9A9388; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
</style>

<rect class="bg" width="600" height="300"/>
<rect class="frame" x="30" y="40" width="540" height="240" rx="10"/>
<rect class="frame" x="50" y="80" width="130" height="70" rx="10"/>
<text class="ink" x="115" y="110" font-size="12" text-anchor="middle">简单反应时</text>
<text class="muted" x="115" y="135" font-size="11" text-anchor="middle">一种刺激→一种反应</text>
<rect class="frame" x="215" y="80" width="130" height="70" rx="10"/>
<text class="ink" x="280" y="110" font-size="12" text-anchor="middle">选择反应时</text>
<text class="muted" x="280" y="135" font-size="11" text-anchor="middle">多刺激→择一反应</text>
<rect class="frame" x="380" y="80" width="130" height="70" rx="10"/>
<text class="ink" x="445" y="110" font-size="12" text-anchor="middle">辨别反应时</text>
<text class="muted" x="445" y="135" font-size="11" text-anchor="middle">辨别后反应</text>
<text class="accent3" x="300" y="210" font-size="14" text-anchor="middle">任务越复杂 → 反应时越长</text>
</svg>