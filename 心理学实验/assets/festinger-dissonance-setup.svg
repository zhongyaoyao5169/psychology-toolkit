<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">

<style>
  .bg { fill: #FAF7F0; }
  .frame { fill: #FFFFFF; stroke: #E5DFD3; stroke-width: 2; }
  .ink { fill: #2B2622; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .muted { fill: #9A9388; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .accent { fill: #7C7AE0; }
  .accent2 { fill: #3AA984; }
  .accent3 { fill: #E2566B; }
  .line { stroke: #2B2622; stroke-width: 2; fill: none; }
  .dash { stroke: #9A9388; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
</style>

<rect class="bg" width="600" height="300"/>
<rect class="frame" x="40" y="35" width="520" height="230" rx="10"/>
<text class="ink" x="300" y="70" font-size="17" text-anchor="middle">实验装置示意</text>
<rect class="frame" x="100" y="110" width="400" height="80" rx="10"/>
<text class="muted" x="300" y="145" font-size="14" text-anchor="middle">实验情境 · 变量操纵 · 反应记录</text>
<text class="muted" x="300" y="175" font-size="12" text-anchor="middle">（示意简图，详见右侧文字说明）</text>
</svg>