<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300">

<style>
  .bg { fill: #FAF7F0; }
  .frame { fill: #FFFFFF; stroke: #E5DFD3; stroke-width: 2; }
  .ink { fill: #2B2622; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .muted { fill: #9A9388; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .accent { fill: #7C7AE0; }
  .accent2 { fill: #3AA984; }
  .accent3 { fill: #E2566B; }
  .line { stroke: #2B2622; stroke-width: 2; fill: none; }
  .dash { stroke: #9A9388; stroke-width: 1.5; fill: none; stroke-dasharray: 6 4; }
</style>

<rect class="bg" width="600" height="300"/>
<rect class="frame" x="40" y="40" width="520" height="230" rx="10"/>
<text class="ink" x="120" y="85" font-size="13" text-anchor="middle">学习至标准</text>
<text class="ink" x="280" y="85" font-size="13" text-anchor="middle">等待间隔</text>
<text class="ink" x="440" y="85" font-size="13" text-anchor="middle">再学习</text>
<line class="line" x1="170" y1="85" x2="220" y2="85"/>
<line class="line" x1="330" y1="85" x2="380" y2="85"/>
<path class="accent2" d="M80,160 140,200 200,175 260,150 320,130 380,120 460,115" fill="none" stroke-width="3"/>
<text class="muted" x="300" y="230" font-size="13" text-anchor="middle">节省率 → 遗忘曲线（先快后慢）</text>
</svg>