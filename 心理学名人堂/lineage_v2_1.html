<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心理学名人堂</title>
<style>
:root{
  --bg:#FAF7F0;--ink:#2B2622;--muted:#9A9388;--line:#E5DFD3;--card:#FFFFFF;
  --accent-mentor:#7C7AE0;--accent-rupture:#E2566B;--accent-inspire:#3AA984;
  --col-w:240px;--header-h:200px;--timeline-w:160px;--canvas-bar:8px;--scroll-gap:4px;--scroll-hit:16px;
  --detail-edge:8px;
  --paper-dot:rgba(107,99,88,.26);
  --paper-dot-size:20px;
}
*{box-sizing:border-box}
html,body{height:100%;overflow:hidden;max-width:100%}
body{margin:0;font-family:"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column}
.header{padding:20px 28px 10px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:50;flex-shrink:0}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header h1{margin:0;font-size:21px;display:flex;align-items:center;gap:8px}
.header p{margin:6px 0 12px;font-size:13px;color:var(--muted);line-height:1.65;max-width:920px}
.stats{font-size:12px;color:var(--muted);white-space:nowrap;padding-top:4px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--ink)}
.search-wrap::before{content:"🔍";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.5}
.persp-wrap{display:flex;flex-direction:column;gap:8px;padding:4px 0 8px}
.persp-row-head,.persp-dir-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.persp-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.02em}
.persp-quick{display:inline-flex;align-items:center;gap:2px}
.q-link{padding:2px 7px;border:none;background:transparent;font-size:11px;color:var(--muted);cursor:pointer;border-radius:4px;line-height:1.4}
.q-link:hover{color:var(--ink);background:var(--line)}
.q-sep{color:var(--line);font-size:11px;user-select:none}
.persp-schools,.persp-directions{display:flex;gap:6px;flex-wrap:wrap}
.persp-dir-section{display:flex;flex-direction:column;gap:6px}
.dir-toggle{
  align-self:flex-start;padding:4px 10px;border-radius:6px;border:1px dashed var(--line);
  background:transparent;font-size:12px;color:var(--muted);cursor:pointer;user-select:none;
  display:inline-flex;align-items:center;gap:4px;transition:color .15s,border-color .15s;
}
.dir-toggle:hover{color:var(--ink);border-color:var(--ink)}
.dir-toggle .arrow{display:inline-block;transition:transform .2s;font-size:10px}
.dir-toggle.expanded .arrow{transform:rotate(180deg)}
.dir-toggle .cnt{font-size:10px;opacity:.75}
.persp-directions{overflow:hidden;max-height:0;opacity:0;transition:max-height .25s ease,opacity .2s ease}
.persp-directions.expanded{max-height:160px;opacity:1;overflow-y:auto}
.p-chip{padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:12px;cursor:pointer;user-select:none;transition:all .15s;white-space:nowrap}
.p-chip:hover{border-color:var(--ink)}
.p-chip.school.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.p-chip.direction.active{background:#fff;color:#000;border:1px solid #000;font-weight:600}
.p-chip.direction.active .cnt{color:#000;opacity:.55}
.p-chip .cnt{opacity:.65;font-size:10px;margin-left:3px}
.toolbar-btns{display:flex;gap:6px}
.btn-sm{padding:5px 12px;border-radius:6px;border:1px solid var(--line);background:#fff;font-size:12px;cursor:pointer}
.btn-sm:hover{border-color:var(--ink)}
.btn-sm.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.legend{display:flex;gap:16px;align-items:center;font-size:13px;flex-wrap:wrap;padding-top:4px}
.legend .filter-all{background:var(--ink);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:600;border:none;font-size:12px}
.legend .filter-all.inactive{background:transparent;color:var(--ink);border:1px solid var(--line)}
.legend .item{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px 8px;border-radius:6px;user-select:none}
.legend .item:hover{background:var(--line)}
.legend .item.dim{opacity:.35}
.legend .dot{width:10px;height:10px;border-radius:50%}
.dot.mentor{background:var(--accent-mentor)}.dot.rupture{background:var(--accent-rupture)}.dot.inspire{background:var(--accent-inspire)}
.canvas-stage{
  flex:1;min-height:0;display:flex;flex-direction:column;
  padding:16px 28px 12px;position:relative;
}
.canvas-body{flex:1;min-height:0;position:relative;display:flex;flex-direction:column;padding-top:42px}
.board-viewport{
  flex:1;min-width:0;min-height:0;overflow:hidden;
  position:relative;padding:4px 0;
  cursor:default;
  background:var(--bg);
}
.board-viewport::-webkit-scrollbar{display:none}
.board-viewport.pan-ready{cursor:grab!important}
.board-viewport.pan-ready *{cursor:grab!important}
.board-viewport.panning{cursor:grabbing!important;user-select:none}
.board-viewport.panning *{cursor:grabbing!important;user-select:none}
.board-wrap{position:relative;padding:0 0 8px;min-height:100%;height:100%}
.board-frame{
  display:grid;
  grid-template-columns:var(--timeline-w) minmax(0,1fr);
  grid-template-rows:auto minmax(0,1fr);
  height:100%;width:100%;min-height:0;
}
.board-corner{grid-column:1;grid-row:1;background:var(--bg);z-index:25;min-height:48px}
.columns-header-wrap{grid-column:2;grid-row:1;overflow:hidden;z-index:20;background:var(--bg);min-width:0}
.timeline-rail-wrap{grid-column:1;grid-row:2;overflow:hidden;z-index:15;background:var(--bg);min-height:0}
.board-scroll{
  grid-column:2;grid-row:2;overflow:auto;min-height:0;min-width:0;
  scrollbar-width:none;-ms-overflow-style:none;-webkit-overflow-scrolling:touch;
  padding-top:12px;
}
.board-scroll::-webkit-scrollbar{display:none}
.board-scaler{position:relative;transform-origin:0 0}
.board-cards-layer{position:absolute;inset:0;transform-origin:0 0;z-index:2}
.board{position:relative}
.board::before{
  content:"";position:absolute;left:0;top:0;right:0;bottom:0;
  pointer-events:none;z-index:0;
  background-color:var(--bg);
  background-image:radial-gradient(circle,var(--paper-dot) 1px,transparent 1px);
  background-size:var(--paper-dot-size) var(--paper-dot-size);
}
.zoom-control{
  position:absolute;top:8px;right:8px;z-index:6;
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;background:rgba(250,247,240,.94);
  border:1px solid var(--line);border-radius:8px;
  backdrop-filter:blur(6px);user-select:none;
}
.zoom-control .zoom-btn{
  width:24px;height:24px;border:1px solid var(--line);border-radius:6px;
  background:#fff;color:var(--ink);font-size:15px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;padding:0;
}
.zoom-control .zoom-btn:hover{border-color:var(--ink)}
.zoom-control .zoom-btn:disabled{opacity:.35;cursor:not-allowed}
.zoom-control input[type=range]{
  width:128px;height:4px;appearance:none;-webkit-appearance:none;
  background:var(--line);border-radius:999px;outline:none;cursor:pointer;
}
.zoom-control input[type=range]::-webkit-slider-thumb{
  appearance:none;-webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:var(--ink);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.zoom-control input[type=range]::-moz-range-thumb{
  width:12px;height:12px;border-radius:50%;background:var(--ink);border:2px solid #fff;
}
.zoom-control .zoom-label{font-size:12px;color:var(--muted);min-width:38px;text-align:right;font-variant-numeric:tabular-nums}
.hscroll-track,.vscroll-track{
  position:absolute;z-index:4;opacity:0;pointer-events:none;
  transition:opacity .18s ease;
}
.hscroll-track.has-scroll,.vscroll-track.has-scroll{pointer-events:auto}
.canvas-stage.scroll-bars-visible .hscroll-track.has-scroll,
.canvas-stage.scroll-bars-visible .vscroll-track.has-scroll,
.hscroll-track.has-scroll:hover,.vscroll-track.has-scroll:hover{opacity:1}
.hscroll-track{
  left:0;right:var(--scroll-gap);bottom:var(--scroll-gap);height:var(--scroll-hit);
  cursor:pointer;
}
.vscroll-track{
  top:0;right:var(--scroll-gap);bottom:var(--scroll-gap);width:var(--scroll-hit);
  cursor:pointer;
}
.scroll-thumb{
  position:absolute;background:rgba(107,99,88,.55);border-radius:2px;
  transition:background .15s, opacity .18s ease;
}
.scroll-thumb:hover,.scroll-thumb.dragging{background:rgba(43,38,34,.72)}
.hscroll-track .scroll-thumb{left:0;bottom:0;height:var(--canvas-bar);min-width:20px}
.vscroll-track .scroll-thumb{right:0;top:0;width:var(--canvas-bar);min-height:20px}
.columns-header{display:grid;gap:12px;margin:0;background:transparent;width:fit-content;transform-origin:0 0;will-change:transform}
.col-head{background:#F1ECE1;border-radius:10px;padding:9px 12px;text-align:center;min-width:var(--col-w)}
.col-head .zh{font-weight:700;font-size:13px}.col-head .en{font-size:9px;letter-spacing:.1em;color:var(--muted);margin-top:2px}
.timeline-rail{position:relative;width:var(--timeline-w);height:100%;pointer-events:none;transform-origin:0 0;will-change:transform;padding-top:12px;box-sizing:border-box}
.timeline-rail::after{content:"";position:absolute;right:20px;top:0;bottom:0;width:2px;background:var(--accent-mentor);opacity:.28;border-radius:1px}
.era-marker{position:absolute;left:0;width:calc(var(--timeline-w) - 32px);display:flex;flex-direction:column;align-items:flex-start;gap:3px;color:var(--muted);font-size:10px;line-height:1.45;border-top:1px dashed var(--line);padding:10px 10px 4px 0}
.era-marker .year{font-weight:700;color:var(--ink);font-size:13px;white-space:nowrap}
.era-marker .label{padding-left:2px}
.person{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 12px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:box-shadow .15s,border-color .15s,transform .15s,opacity .2s;height:60px;position:relative;z-index:5;width:var(--col-w)}
.person:hover{box-shadow:0 4px 14px rgba(0,0,0,.06);transform:translateY(-1px)}
.person.hidden{display:none}
.person.dimmed{opacity:.16}.person.highlighted{border-color:var(--ink);box-shadow:0 4px 14px rgba(0,0,0,.10)}
.person.selected{border:2px solid var(--ink);background:#fff}
.avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.08);object-fit:cover;background:#eee;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.person .name-cn{font-weight:700;font-size:13px;line-height:1.3}
.person .name-en{font-size:10px;color:var(--muted)}
.person .name-meta{font-size:10px;color:var(--muted);font-weight:400}
.person .dir-tag{display:inline-block;font-size:9px;color:#6B6358;background:#F1ECE1;border-radius:4px;padding:1px 6px;margin-top:3px;line-height:1.4}
.p-chip.school{border-color:#C8BFAE}
.p-chip.direction{font-style:normal;opacity:.92}
.panel-tag.school{background:#F1ECE1;border-color:#C8BFAE}
.panel-tag.direction{color:#6B6358}
svg.connections{position:absolute;top:0;left:0;pointer-events:none;z-index:1}
svg.connections path{fill:none;stroke-width:2;vector-effect:non-scaling-stroke;opacity:0;transition:opacity .25s}
svg.connections path.visible{opacity:.8}svg.connections path.dimmed{opacity:.05!important}
.detail-pop{
  position:fixed;z-index:40;
  top:var(--detail-top-min, 220px);bottom:var(--detail-bottom, 12px);right:var(--detail-right, 8px);left:auto;
  width:min(340px,calc(100vw - var(--detail-edge) * 2));
  background:var(--bg);border:1px solid var(--ink);border-radius:14px;
  box-shadow:0 10px 36px rgba(0,0,0,.14);
  opacity:0;pointer-events:none;transform:translateY(4px);
  transition:opacity .2s,transform .2s;
  display:flex;flex-direction:column;overflow:hidden;
}
.detail-pop.show{opacity:1;pointer-events:auto;transform:none}
.detail-pop-body-wrap{flex:1 1 0;min-height:0;display:flex;overflow:hidden}
.detail-pop-body{
  flex:1 1 0;min-height:0;overflow-x:hidden;overflow-y:scroll;
  padding:16px 18px 14px;padding-right:10px;
  scrollbar-gutter:stable;
  scrollbar-width:thin;
  scrollbar-color:rgba(107,99,88,.72) rgba(107,99,88,.14);
  -webkit-overflow-scrolling:touch;
}
.detail-pop-body::-webkit-scrollbar{width:8px}
.detail-pop-body::-webkit-scrollbar-track{background:rgba(107,99,88,.14);border-radius:4px;margin:2px 0}
.detail-pop-body::-webkit-scrollbar-thumb{
  background:rgba(107,99,88,.72);border-radius:4px;border:1px solid rgba(250,247,240,.85);
}
.detail-pop-body::-webkit-scrollbar-thumb:hover{background:rgba(43,38,34,.82)}
.detail-pop-close{
  position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;
  border:1px solid var(--line);background:#fff;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;color:var(--muted);z-index:2;
}
.detail-pop-close:hover{color:var(--ink);border-color:var(--ink)}
.detail-pop-layout{display:flex;flex-direction:column;gap:20px;min-height:0}
.detail-pop-identity{display:flex;align-items:flex-end;gap:12px}
.detail-pop .panel-photo{width:64px;height:64px;border-radius:12px;margin-bottom:0;flex-shrink:0}
.detail-pop .panel-tag{margin-bottom:0}
.detail-pop h2{margin:0 0 2px;font-size:20px;padding-right:28px}
.detail-pop .meta{font-size:11px;margin:0}
.detail-pop .panel-section{margin-bottom:0}
.detail-pop .panel-section .body-text{font-size:12.5px;padding:10px 12px;line-height:1.7}
.detail-pop .theory-list li{font-size:12px}
.detail-pop .relation-row{font-size:12px;padding:6px 8px}
.panel-photo{width:84px;height:84px;border-radius:14px;object-fit:cover;margin-bottom:12px;border:1px solid var(--line)}
.panel-tag{display:inline-block;border:1px solid var(--line);border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;background:#fff;margin-bottom:8px}
.panel-section{margin-bottom:16px}
.panel-section .label{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:7px}
.panel-section .position{font-size:14px;font-weight:700;line-height:1.55}
.detail-pop .position{font-size:13px}
.panel-section .body-text{font-size:13px;line-height:1.8;color:#4A443D;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;white-space:pre-wrap}
.theory-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
.theory-list li{font-size:13px;line-height:1.65;padding-left:14px;position:relative}
.theory-list li::before{content:"";position:absolute;left:0;top:7px;width:6px;height:6px;border-radius:50%;background:var(--accent-inspire)}
.theory-list b{font-weight:700}
.relations{display:flex;flex-direction:column;gap:7px}
.relation-row{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px;cursor:pointer}
.relation-row:hover{border-color:var(--ink)}
.relation-row .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;color:#fff;flex-shrink:0;margin-top:1px}
.relation-row .tag.mentor{background:var(--accent-mentor)}.relation-row .tag.rupture{background:var(--accent-rupture)}.relation-row .tag.inspire{background:var(--accent-inspire)}
.empty-state{padding:60px 20px;text-align:center;color:var(--muted);font-size:14px}
@media(max-width:900px){.header{padding:14px 16px}.canvas-stage{padding:12px 16px 10px}:root{--header-h:240px}}
</style>
</head>
<body>
<div class="header" id="header">
  <div class="header-top">
    <div>
      <h1>心理学名人堂</h1>
      <p>纵轴依生辰年岁演进，横轴呈七大学派与研究方向分布。点击学者卡片高亮承袭、启发与决裂脉络</p>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><input type="search" id="searchInput" placeholder="搜索姓名、学派、理论…" autocomplete="off"></div>
    <div class="toolbar-btns">
      <button class="btn-sm" id="btnAllPersp">显示全部视角</button>
      <button class="btn-sm" id="btnDefault">默认视图</button>
    </div>
  </div>
  <div class="persp-wrap">
    <div class="persp-row-head">
      <span class="persp-label">学派</span>
      <span class="persp-quick">
        <button type="button" class="q-link" id="schoolSelectAll">全选</button>
        <span class="q-sep">·</span>
        <button type="button" class="q-link" id="schoolClearAll">清空</button>
      </span>
    </div>
    <div class="persp-schools" id="perspSchools"></div>
    <div class="persp-dir-section">
      <div class="persp-dir-head">
        <button type="button" class="dir-toggle" id="dirToggle">研究方向 <span class="arrow">▾</span></button>
        <span class="persp-quick">
          <button type="button" class="q-link" id="dirSelectAll">全选</button>
          <span class="q-sep">·</span>
          <button type="button" class="q-link" id="dirClearAll">清空</button>
        </span>
      </div>
      <div class="persp-directions" id="perspDirections"></div>
    </div>
  </div>
  <div class="legend">
    <button class="filter-all" id="filterAll">全部联结</button>
    <div class="item" data-rel="mentor"><span class="dot mentor"></span>师上/门生</div>
    <div class="item" data-rel="rupture"><span class="dot rupture"></span>革命决裂</div>
    <div class="item" data-rel="inspire"><span class="dot inspire"></span>思想启发</div>
  </div>
</div>
<div class="canvas-stage" id="canvasStage">
  <div class="zoom-control" id="zoomControl">
    <button type="button" class="zoom-btn" id="zoomOut" title="缩小" aria-label="缩小">−</button>
    <input type="range" id="zoomSlider" min="50" max="100" value="100" aria-label="缩放比例">
    <button type="button" class="zoom-btn" id="zoomIn" title="放大" aria-label="放大">+</button>
    <span class="zoom-label" id="zoomLabel">100%</span>
  </div>
  <div class="canvas-body">
    <div class="board-viewport" id="boardViewport">
      <div class="board-wrap" id="boardWrap">
        <div class="board-frame" id="boardFrame">
          <div class="board-corner" id="boardCorner"></div>
          <div class="columns-header-wrap" id="colsHeaderWrap">
            <div class="columns-header" id="colsHeader"></div>
          </div>
          <div class="timeline-rail-wrap" id="timelineRailWrap">
            <div class="timeline-rail" id="timelineRail"></div>
          </div>
          <div class="board-scroll" id="boardScroll">
            <div class="board-scaler" id="boardScaler">
              <div class="board" id="board">
                <svg class="connections" id="connSvg"></svg>
                <div class="board-cards-layer" id="boardCardsLayer"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="empty-state" id="emptyState" style="display:none">没有匹配的学者，请调整搜索或视角筛选。</div>
      </div>
    </div>
  </div>
  <div class="hscroll-track" id="hScrollTrack"><div class="scroll-thumb" id="hScrollThumb"></div></div>
  <div class="vscroll-track" id="vScrollTrack"><div class="scroll-thumb" id="vScrollThumb"></div></div>
</div>
<div class="detail-pop" id="detailPop">
  <button class="detail-pop-close" id="detailPopClose" type="button">✕</button>
  <div class="detail-pop-body-wrap">
    <div class="detail-pop-body" id="detailPopBody"><div id="detailPopContent"></div></div>
  </div>

etroactive inhibition）。倒摄抑制依然是解释遗忘现象的主要理论之一。惟以后心理学家补充了缪勒的理论，都认为除新学习会影响旧学习的记忆之外，旧学习也会干扰新学习的记忆。于是记忆干扰论中，除倒摄抑制之外，增加了前摄抑制（proactive inhibitions），使缪勒的遗忘干扰理论更形完备。"}, {"t": "色觉理论补助解释", "d": "在19 世纪70 年代，德国生理心理学家E.海林提出的色觉理论，称为色觉相对历程论。按海林的理论，当黑 - 白、蓝 - 黄、红 - 绿各组相对两种色光刺激强度相等时，结果所产生的色觉是无色感。缪勒补充解释，事实上此种情形下所产生的感觉不应是无色感，而应该产生灰色感，原因是大脑皮质的灰质发生作用所致。后来支持海林色觉说的人也都采用了缪勒的假说。"}], "experiment": {"title": "1.学习记忆研究", "body": "1.学习记忆研究\n继承了艾宾浩斯反对冯特所持“实验心理学只能研究基本心理历程”的理念。又改进了艾宾浩斯的学习记忆研究方法"}}, {"id": "铁钦纳", "cn": "铁钦纳", "en": "爱德华·布雷福德·铁钦纳", "col": "struct", "country": "英籍美国", "born": 1867, "died": 1927, "school": "心理学家，实验心理学的代表人物之一", "position": "构造主义创始人-世界上第一个心理学派 使心理学第一次脱离了哲学和生理学", "bio": "构造主义创始人-世界上第一个心理学派\n使心理学第一次脱离了哲学和生理学", "avatar": "avatars/row_9.png", "isSchool": true, "theories": [{"t": "观点：认为科学分为纯科学和应用科学，而心理学是纯科学，主张只研究心理过程或心理内容，反对研究心理的意义和功用", "d": ""}, {"t": "研究方法：", "d": "改造冯特的实验室内省法，坚持只有训练有素的观察者才能进行内省"}], "experiment": {"title": "1.观点：认为科学分为纯科学和应用科学，而心理学是纯科学，主张只研究心理过程或心理内容，反对研究心理的意义和功用", "body": "1.观点：认为科学分为纯科学和应用科学，而心理学是纯科学，主张只研究心理过程或心理内容，反对研究心理的意义和功用"}}, {"id": "普莱尔", "cn": "普莱尔", "en": "普莱耶尔或普莱奥", "col": "dev", "country": "德国", "born": 1841, "died": 1897, "school": "生理学家 / 实验心理学家", "position": "科学儿童发展心理学的奠基人", "bio": "科学儿童发展心理学的奠基人", "avatar": "avatars/row_10.jpeg", "tag": "毕生发展", "theories": [{"t": "对自己的孩子从出生到3岁进行了系统的观察和实验性的研究，详细记录了儿童心理发展的过程", "d": ""}, {"t": "发表了《儿童心理》", "d": "被公认为第一部科学的、系统的儿童心理学著作，它的出版标志着科学儿童心理学的正式诞生"}], "experiment": {"title": "对自己的孩子从出生到3岁进行了系统的观察和实验性的研究，详细记录了儿童心理发展的过程", "body": "对自己的孩子从出生到3岁进行了系统的观察和实验性的研究，详细记录了儿童心理发展的过程"}}, {"id": "高尔顿", "cn": "高尔顿", "en": "弗朗西斯·高尔顿", "col": "measure", "country": "英国", "born": 1822, "died": 1911, "school": "气象学家、地理学家", "position": "达尔文的表弟，深受其进化论思想的影响，开创了优生学", "bio": "达尔文的表弟，深受其进化论思想的影响，开创了优生学", "avatar": "avatars/row_12.jpeg", "tag": "心理测量", "theories": [{"t": "三个“首先”：", "d": "1）首先倡导测验运动《遗传的天才》\n2）首先提出“测验”和“心理测量”-《人类才能及其发展研究》\n3）第一次尝试大规模系统测量人的个体差异"}, {"t": "四个“相关贡献”：", "d": "1）评定量表、心理测量问卷--将统计学应用于心理学\n2）扩充了百分位法、粗浅的计算相关 ·巴甫洛夫", "col": "behav", "country": "俄国", "born": 1849, "died": 1936, "school": "生理学家", "position": "经典条件反射提出者 ”巴普洛夫的狗“", "bio": "经典条件反射提出者\n”巴普洛夫的狗“", "avatar": "avatars/row_27.jpeg", "isSchool": true, "theories": [{"t": "因在消化生理学取得出色成功，获得诺贝尔生理学奖和医学奖", "d": ""}, {"t": "消化生理实验和经典条件反射实验对象都是狗", "d": ""}], "experiment": {"title": "因在消化生理学取得出色成功，获得诺贝尔生理学奖和医学奖", "body": "因在消化生理学取得出色成功，获得诺贝尔生理学奖和医学奖"}}, {"id": "桑代克", "cn": "桑代克", "en": "爱德华·李·桑代克", "col": "behav", "country": "美国", "born": 1847, "died": 1949, "school": "心理学家", "position": "动物心理学的开创者 与马斯洛关系密切 教育心理学奠基人，使教育心理学从教育学和儿童心理学中分化出来，成为一门独立的学科", "bio": "动物心理学的开创者\n与马斯洛关系密切\n教育心理学奠基人，使教育心理学从教育学和儿童心理学中分化出来，成为一门独立的学科", "avatar": "avatars/row_28.jpeg", "isSchool": true, "theories": [{"t": "试误学习-饿猫迷笼实验", "d": "试误学习的障碍不是动物所能观察得到的，以致它们只得进行盲目尝试。--与柯勒的顿悟学习理论相反"}, {"t": "学习律：", "d": "（1）准备律（Law of Readiness）。这个定律包括三个组成部分：①当一个传导单位准备好传导时，传导而不受任何干扰，就会引起满意之感；②当一个传导单位准备好传导时，不得传导就会引起烦恼之感；③当一个传导单位未准备传导时，强行传导就会引起烦恼之感。\n准备律是反应者的一种内部心理状态。一切反应是由个人的内部状况和外部情境所共同决定的。因此学习不是消极地接受知识，而是一种活动。学习者必须要有某种需要，体现为兴趣和欲望。此外良好的心理准备还应包括对该情境起反应所必不可少的素养和能力准备。\n（2）练习律（Law of Exercise）。这个定律分为两个次律：①应用律——一个已形成的可变联结，若加以应用，就会变强；②失用律——一个已形成的可变联结，若久不应用，就会变弱。\n练习律的实质就是强化刺激与反应的感应结。反应在情境中用得越多，它与这个情境发生的联结越牢固。反之，长期不用这个反应，这种联结就趋于减弱。后来，桑代克修改了这条定律，指出单纯的重复练习，不如对这个反应的结果给以奖赏取得的效果更大些。\n（3）效果律（Law of Effect）。这个定律强调个体对反应结果的感受将决定个体学习的效果。即如果个体对某种情境所起的反应形成可变联结之后伴随着一种满足的状况，这种联结就会增强；反之，如果伴随的是一种使人感到厌烦的状况，这种联结就会减弱。桑代克在20世纪30年代进一步考察了这条定律，发现，感到满足比感到厌烦能产生更强的学习动机，因此他修正了效果律，更强调奖赏，而不大强调惩罚。"}], "experiment": {"title": "1.试误学习-饿猫迷笼实验", "body": "1.试误学习-饿猫迷笼实验\n试误学习的障碍不是动物所能观察得到的，以致它们只得进行盲目尝试。--与柯勒的顿悟学习理论相反"}}, {"id": "华生", "cn": "华生", "en": "约翰·华生", "col": "behav", "country": "美国", "born": 1878, "died": 1958, "school": "心理学家", "position": "行为主义奠基人 《一个行为主义者眼中的心理学》", "bio": "行为主义奠基人\n《一个行为主义者眼中的心理学》", "avatar": "avatars/row_29.jpeg", "isSchool": true, "theories": [{"t": "反对传统意识心理学把意识作为心理学的研究对象，把内省法作为心理学的研究方法，而主张心理学用自然科学的客观方法研究行为，并在此基础上构建了他的行为主义心理理论体系。他认为行为主义的理论目标是对行为的预测和控制。为了实现这一目的，他贯彻经验实证原则，继承机能主义的传统，认为心理学是纯粹自然科学的一个客观实验分支。由此，华生认为凡是不可经验的对象都不能作为心理学的对象，主张放弃内省法，放弃所有与意识有关的范畴，如感觉、情绪、思维等等。刺激（S）-反应（R）公式", "d": ""}], "experiment": {"title": "反对传统意识心理学把意识作为心理学的研究对象，把内省法作为心理学的研究方法，而主张心理学用自然科学的客观方法研究行为，并在此基础上构建了他的行为主义心理理论体系。他认为行为主义的理论目标是对行为的预测", "body": "反对传统意识心理学把意识作为心理学的研究对象，把内省法作为心理学的研究方法，而主张心理学用自然科学的客观方法研究行为，并在此基础上构建了他的行为主义心理理论体系。他认为行为主义的理论目标是对行为的预测和控制。为了实现这一目的，他贯彻经验实证原则，继承机能主义的传统，认为心理学是纯粹自然科学的一个客观实验分支。由此，华生认为凡是不可经验的对象都不能作为心理学的对象，主张放弃内省法，放弃所有与意识有关的范畴，如感觉、情绪、思维等等。刺激（S）-反应（R）公式"}}, {"id": "斯金纳", "cn": "斯金纳", "en": "伯尔赫斯·弗雷德里克·斯金纳", "col": "behav", "country": "美国", "born": 1904, "died": 1990, "school": "心理学家", "position": "操作性条件反射提出者 “斯金纳箱” 新行为主义学习理论的创始人", "bio": "操作性条件反射提出者\n“斯金纳箱”\n新行为主义学习理论的创始人", "avatar": "avatars/row_30.jpeg", "isSchool": true, "theories": [{"t": "老鼠学习动机研究", "d": "战鸽研究\n操作条件性刺激简述\n经典性条件作用用公式来表示就是：刺激⇒反应（即S—R）\n操作性条件作用用公式来表示就是：操作⇒强化（即R—S）"}, {"t": "斯金纳在华生等人的基础上向前迈进了一大步，提出了有别于巴甫洛夫的条件反射的另一种条件反射行为，并将二者做了区分，在此基础上提出了自己的行为主义理论——操作性条件反射理论。他长期致力于研究鸽子和老鼠的操作性条件反射行为，提出了“及时强化”的概念以及强化的时间规律，形成了自己的一套理论", "d": ""}], "experiment": {"title": "老鼠学习动机研究", "body": "老鼠学习动机研究\n战鸽研究\n操作条件性刺激简述\n经典性条件作用用公式来表示就是：刺激⇒反应（即S—R）\n操作性条件作用用公式来表示就是：操作⇒强化（即R—S）"}}, {"id": "托尔曼", "cn": "托尔曼", "en": "爱德华·切斯·托尔曼", "col": "behav", "country": "美国", "born": 1886, "died": 1959, "school": "心理学家", "position": "新行为主义学派代表人物之一 目的行为主义的创始人", "bio": "新行为主义学派代表人物之一\n目的行为主义的创始人", "avatar": "avatars/row_31.jpeg", "isSchool": true, "theories": [{"t": "整体行为-迷津实验", "d": "如一只白鼠如果面对着两条或两条以上的达到目标的途径，它总是在一定限度内选择在时间和距离上都较短的途径。托尔曼认为，在人类身上，这一特征表现得最为明显。"}, {"t": "行为的决定因素：中介变量", "d": "反对把行为看作是刺激-反应的简单做法，认为介于环境刺激和行为反应之间的心理过程与有机体所作出的行为反应具有密切的关系，他提出中介变量的概念，认为认知、期望、目的、假设和嗜好等都是中介变量的具体表现形式。他还认为，对于行为的最初原因以及最后引起的行为本身都应该进行客观的观察并在操作上给以规定。"}, {"t": "学习理论：", "d": "学习的先期准备：期待\n学习的本质：位置学习\n学习的表现形态：潜伏学习"}], "experiment": {"title": "1.整体行为-迷津实验", "body": "1.整体行为-迷津实验\n如一只白鼠如果面对着两条或两条以上的达到目标的途径，它总是在一定限度内选择在时间和距离上都较短的途径。托尔曼认为，在人类身上，这一特征表现得最为明显。"}}, {"id": "班杜拉", "cn": "班杜拉", "en": "阿尔伯特·班杜拉", "col": "behav", "country": "美国", "born": 1925, "died": 2021, "school": "", "position": "社会学习理论创始人 新行为主义代表人物之一", "bio": "社会学习理论创始人\n新行为主义代表人物之一", "avatar": "avatars/row_32.jpeg", "isSchool": true, "theories": [{"t": "自我效能", "d": "班杜拉用了一个概念来描述人的这种有用感——“活出有用的感觉”-叫做自我效能感，就是做什么事情都有价值、有结果、有成就，能够造福周围的人，而且能够造福自己。"}, {"t": "提出了社会学习理论，认为心理学家应当“把临床现象用经过实验验证的方式加以概念化”。班杜拉认为，心理学研究应当在实验中进行，以控制决定行为的因素。", "d": "机体强化的三种方式：直接强化、替代强化、自我强化"}, {"t": "四点影响自我效能形成的因素：直接的成败经验，替代性经验，言语劝说和情绪的唤起", "d": ""}], "experiment": {"title": "1.自我效能", "body": "1.自我效能\n班杜拉用了一个概念来描述人的这种有用感——“活出有用的感觉”-叫做自我效能感，就是做什么事情都有价值、有结果、有成就，能够造福周围的人，而且能够造福自己。"}}, {"id": "韦特海默", "cn": "韦特海默", "en": "马克斯·韦特海默", "col": "gestalt", "country": "德国", "born": 1880, "died": 1943, "school": "心理学家，哲学家", "position": "格式塔心理学（也称为完形心理学）的创始人之一", "bio": "格式塔心理学（也称为完形心理学）的创始人之一", "avatar": "avatars/row_34.jpeg", "isSchool": true, "theories": [{"t": "在宾夕法尼亚大学开办第一个儿童行为矫正诊所", "d": ""}, {"t": "似动研究", "d": "韦特海默通过对似动现象的知觉研究，提出了完形主义的观点，创立了格式塔心理学。所谓似动现象（phi phenomenon），是指先后出现的两个静止刺激，被个体知觉为刺激从前一个刺激的位置向后面一个刺激的位置运动的现象。"}, {"t": "格式塔心理学的创始人有韦特海默（Max Wertheimer）、苛勒（Wolfgang Köhler）和考夫卡（Kurt Koffka）。这三位心理学家在20世纪初共同创立了格式塔心理学，也称为完形心理学。他们强调心理现象的整体性和动态性，认为整体不等于部分之和，整体先于部分并决定部分。这一观点对后来的心理学研究产生了深远的影响，推动了心理学领域的新发展。", "d": "韦特海默通过对似动现象的知觉研究，提出了完形主义的观点，这是格式塔心理学的基础。苛勒则把格式塔原理应用到发展心理学，研究了顿悟学习，并提出了学习理论的顿悟说。考夫卡则明确认定心理学的任务是研究行为与心理物理场的因果关系，并在发展心理学中贯彻完形理论。他们的研究方法和理论观点为格式塔心理学的发展奠定了坚实的基础。"}], "experiment": {"title": "在宾夕法尼亚大学开办第一个儿童行为矫正诊所", "body": "在宾夕法尼亚大学开办第一个儿童行为矫正诊所"}}, {"id": "苛勒", "cn": "苛勒", "en": "沃尔夫冈·柯勒", "col": "gestalt", "country": "德裔美籍", "born": 1887, "died": 1967, "school": "认知心理学、实验心理学", "position": "格式塔心理学代表人物", "bio": "格式塔心理学代表人物", "avatar": "avatars/row_35.jpeg", "isSchool": true, "theories": [{"t": "柯勒把直接经验作为自己的研究对象，这种直接经验是一种自然现象，只能通过观察来发现，因此格式塔心理学强调运用自然观察法。同时，柯勒以直接经验（有时也称现象经验）和行为作为研究对象。格式塔心理学在具体研究中除了使用整体观察法，还运用实验法。柯勒所运用的实验法主要是实验现象学方法。", "d": ""}, {"t": "顿悟学习-黑猩猩香蕉实验", "d": "猩猩好像突然在某个时候看到解决问题的办法。苛勒解释说，这是猩猩对情境的观点重新构造引起的。"}], "experiment": {"title": "柯勒把直接经验作为自己的研究对象，这种直接经验是一种自然现象，只能通过观察来发现，因此格式塔心理学强调运用自然观察法。同时，柯勒以直接经验（有时也称现象经验）和行为作为研究对象。格式塔心理学在具体研究", "body": "柯勒把直接经验作为自己的研究对象，这种直接经验是一种自然现象，只能通过观察来发现，因此格式塔心理学强调运用自然观察法。同时，柯勒以直接经验（有时也称现象经验）和行为作为研究对象。格式塔心理学在具体研究中除了使用整体观察法，还运用实验法。柯勒所运用的实验法主要是实验现象学方法。"}}, {"id": "考夫卡", "cn": "考夫卡", "en": "库尔特·考夫卡", "col": "gestalt", "country": "德裔美籍", "born": 1886, "died": 1941, "school": "心理学家", "position": "格式塔心理学代表人物 儿童心理学发展论 《格式塔心理学原理》", "bio": "格式塔心理学代表人物\n儿童心理学发展论\n《格式塔心理学原理》", "avatar": "avatars/row_36.jpeg", "isSchool": true, "theories": [{"t": "促进了格式塔心理学的推广", "d": "推动了知觉心理学的发展\n孕育了现代认知心理学的一些记忆观点"}, {"t": "考夫卡认为儿童身心的发展也是遵循这个原则。例如，婴儿的动作，最初是整体反应，以后才逐步分化。又如思维不是出感知觉元素拼凑起来的，而是有其自己的本质的。认为儿童身心发展遵循两大格式塔原则，即儿童的身心发展顺序遵循出整体到特殊的法则，先从全身粗略性活动开始，而后到局部性精细动作", "d": ""}], "experiment": {"title": "促进了格式塔心理学的推广", "body": "促进了格式塔心理学的推广\n推动了知觉心理学的发展\n孕育了现代认知心理学的一些记忆观点"}}, {"id": "马斯洛", "cn": "马斯洛", "en": "亚伯拉罕·马斯洛", "col": "human", "country": "美国", "born": 1908, "died": 1970, "school": "心理学家", "position": "人本主义心理学奠基人", "bio": "人本主义心理学奠基人", "avatar": "avatars/row_38.jpeg", "isSchool": true, "theories": [{"t": "社会心理学家，第三代心理学的开创者", "d": "提出了融合精神分析心理学和行为主义心理学的人本主义心理学，于其中融合了其美学思想。他的主要成就包括提出了人本主义心理学，提出了马斯洛需求层次理论。"}, {"t": "马斯洛的人本主义心理学为其美学理论提供了心理学基础。其心理学理论核心是人通过“自我实现”，满足多层次的需要系统，达到“高峰体验”，重新找回被技术排斥的人的价值，实现完美人格。他认为人作为一个有机整体，具有多种动机和需要，包括生理需要（physiological needs）、安全需要（security needs）、归属与爱的需要（love and belonging needs）、自尊需要（respect & esteem needs）和自我实现需要（self-actualization needs）。马斯洛认为，当人的低层次需求被满足之后，会转而寻求实现更高层次的需要。其中自我实现的需要是超越性的，追求真、善、美，将最终导向完美人格的塑造，高峰体验代表了人的这种最佳状态。", "d": ""}], "experiment": {"title": "社会心理学家，第三代心理学的开创者", "body": "社会心理学家，第三代心理学的开创者\n提出了融合精神分析心理学和行为主义心理学的人本主义心理学，于其中融合了其美学思想。他的主要成就包括提出了人本主义心理学，提出了马斯洛需求层次理论。"}}, {"id": "罗杰斯", "cn": "罗杰斯", "en": "卡尔·罗杰斯", "col": "human", "country": "美国", "born": 1902, "died": 1987, "school": "心理学家、哲学博士", "position": "人本主义心理学代表人物 美国应用心理学的创始人之一", "bio": "人本主义心理学代表人物\n美国应用心理学的创始人之一", "avatar": "avatars/row_39.jpeg", "isSchool": true, "theories": [{"t": "关于自我的理论是罗杰斯人格理论的核心，也是他的心理治疗理论和人本主义教育理论的基础", "d": "“以学生为中心”的人本主义教育观：1.知情统一的教学目标观、有意义的自由学习观、以学生为中心的教育观-非指导性学习（真诚一致、无条件积极关注、同理心）"}, {"t": "认为个体是完整的有机体的存在，是一切体验的发源地，且在自我实现倾向的驱使下成长与发展，其结果就是“自我”、“自我概念”的发展、扩充及实现。", "d": ""}, {"t": "用“无条件积极关注”来解释自我发展的机制。所谓无条件积极关注是一种没有价值条件的积极关注体验，即使自我行为不够理想时，他觉得自己仍受到父母或他人真正的尊重、理解和关怀。", "d": ""}], "experiment": {"title": "关于自我的理论是罗杰斯人格理论的核心，也是他的心理治疗理论和人本主义教育理论的基础", "body": "关于自我的理论是罗杰斯人格理论的核心，也是他的心理治疗理论和人本主义教育理论的基础\n“以学生为中心”的人本主义教育观：1.知情统一的教学目标观、有意义的自由学习观、以学生为中心的教育观-非指导性学习（真诚一致、无条件积极关注、同理心）"}}, {"id": "奈塞尔", "cn": "奈塞尔", "en": "乌尔里克·奈塞尔", "col": "cog", "country": "美国", "born": 1928, "died": 2012, "school": "心理学家", "position": "认知心理学奠基人 《认知心理学》标志着认知心理学的开始", "bio": "认知心理学奠基人\n《认知心理学》标志着认知心理学的开始", "avatar": "avatars/row_41.jpeg", "isSchool": true, "theories": [{"t": "他的主要研究兴趣是记忆、智力以及自我概念。他对自然环境下关于生活事件的记忆和个体、群体在测验成绩上的差异的研究十分著名", "d": ""}, {"t": "1976《认知与现实》，阐述了其认知研究的生态学观点，并创造性地提出了“知觉环”理论。该书的出版不仅标志着他由传统的信息加工研究范式转向了生态学研究范式，而且标志着认知心理学在20世纪70年代的一个重大变化——生态论认知心理学初露端倪。", "d": ""}], "experiment": {"title": "他的主要研究兴趣是记忆、智力以及自我概念。他对自然环境下关于生活事件的记忆和个体、群体在测验成绩上的差异的研究十分著名", "body": "他的主要研究兴趣是记忆、智力以及自我概念。他对自然环境下关于生活事件的记忆和个体、群体在测验成绩上的差异的研究十分著名"}}, {"id": "皮亚杰", "cn": "皮亚杰", "en": "让·皮亚杰", "col": "cog", "country": "瑞士", "born": 1896, "died": 1980, "school": "生物学、哲学家 / 儿童心理学家", "position": "儿童心理学之父 儿童认知发展四阶段理论", "bio": "儿童心理学之父\n儿童认知发展四阶段理论", "avatar": "avatars/row_42.jpeg", "isSchool": true, "theories": [{"t": "创立发生认识论：皮亚杰认为，知识是通过个体与环境的相互作用逐步建构起来的，而不是通过简单的经验积累。他提出了同化与顺应的概念，用以解释个体如何根据新信息调整自己的认知结构。", "d": "从生物学的观点来看，同化就是把外界元素整合于一个机体的正在形成中或已完全形成的结构内。”可以用公式表达为：T+I→A T+ E 式中，T是一种结构；I是被整合的物质或能量；E是被排除的物质和能量；A是大于I的系数，它意味着这种结构的强化是借助物质的增加或运算效率的增加。---“刺激输入的过滤或改变叫做同化；内部图式的改变，以适应现实，叫做顺应。”"}, {"t": "道德发展阶段论（通过对偶故事法）", "d": "第一阶段为“自我中心阶段”或前道德阶段(2－5岁)：儿童缺乏按规则来规范行为的自觉性，在亲子关系、同伴关系、价值判断等方面均表现出自我中心倾向。\n第二阶段为“权威阶段”或他律道德阶段(6－7、8岁)：儿童表现出对外在权威绝对尊重和顺从，把权威确定的规则看作是绝对的、不可更改的，在评价自己和他人的行为时完全以权威的态度为依据。\n第三阶段为“可逆性阶段”或初步自律道德阶段(8－10岁)：儿童的思维具有了守恒性和可逆性，他们已经不把规则看成是一成不变的东西，逐渐从他律转入自律。\n第四阶段为“公正阶段”或自律道德阶段(10－12岁)：儿童继可逆性之后，公正观念或正义感得到发展，儿童的道德观念倾向于主持公正、平等。"}], "experiment": {"title": "1.创立发生认识论：皮亚杰认为，知识是通过个体与环境的相互作用逐步建构起来的，而不是通过简单的经验积累。他提出了同化与顺应的概念，用以解释个体如何根据新信息调整自己的认知结构。", "body": "1.创立发生认识论：皮亚杰认为，知识是通过个体与环境的相互作用逐步建构起来的，而不是通过简单的经验积累。他提出了同化与顺应的概念，用以解释个体如何根据新信息调整自己的认知结构。\n从生物学的观点来看，同化就是把外界元素整合于一个机体的正在形成中或已完全形成的结构内。”可以用公式表达为：T+I→A T+ E 式中，T是一种结构；I是被整合的物质或能量；E是被排除的物质和能量；A是大于I的系数，它意味着这种结构的强化是借助物质的增加或运算效率的增加。---“刺激输入的过滤或改变叫做同化；内部图式的改变，以适应现实，叫做顺应。”"}}, {"id": "西蒙", "cn": "西蒙", "en": "西蒙·派珀特", "col": "cog", "country": "南非、美国", "born": 1928, "died": 2016, "school": "数学家、计算机科学家、心理学家", "position": "教育信息化奠基人 近代人工智能领域的先驱者之一", "bio": "教育信息化奠基人\n近代人工智能领域的先驱者之一", "avatar": "avatars/row_43.jpeg", "isSchool": true, "theories": [{"t": "心理学学习：1958年至1963年，他在瑞士日内瓦大学师从著名教育家和儿童心理学家皮亚杰，并与其一起工作。这段经历对其学术生涯产生了深远影响，促使他思考如何利用数学去理解和解释学习者的学习与思维。", "d": ""}, {"t": "行为决策理论", "d": "含义、前提、原则、方法、影响因素"}], "experiment": {"title": "心理学学习：1958年至1963年，他在瑞士日内瓦大学师从著名教育家和儿童心理学家皮亚杰，并与其一起工作。这段经历对其学术生涯产生了深远影响，促使他思考如何利用数学去理解和解释学习者的学习与思维。", "body": "心理学学习：1958年至1963年，他在瑞士日内瓦大学师从著名教育家和儿童心理学家皮亚杰，并与其一起工作。这段经历对其学术生涯产生了深远影响，促使他思考如何利用数学去理解和解释学习者的学习与思维。"}}, {"id": "布罗德本特", "cn": "布罗德本特", "en": "唐纳德·布罗德本特", "col": "cog", "country": "英国", "born": 1926, "died": 1993, "school": "认知心理学", "position": "战争期间应用心理学发展", "bio": "战争期间应用心理学发展", "avatar": "avatars/row_44.jpeg", "isSchool": true, "theories": [{"t": "撰写《知觉与交流》", "d": ""}, {"t": "改进双耳分听实验", "d": ""}, {"t": "布罗德本特主张用信息加工理论研究注意、感觉和记忆等认知过程。他在双耳同时分听实验的基础上提出了注意的“过滤器模型”。", "d": "过滤器模型（filter model，1958）认为，来自外界的信息是大量的，而人的神经系统高级中枢的加工能力则是有限的，于是就出现了瓶颈。为了避免系统超载，就需要某种过滤器来对之加以调节，选择其中较少的信息，使其进入高级分析阶段，这类信息将受到进一步加工而被识别和存储，而其他信息则不让通过。这种过滤器体现着注意的选择功能。因此这种理论被称为“注意的过滤器模型”。\n过程：向被试的右耳呈现 3 个数字，同时向左耳则呈现另外 3 个数字，如：右耳：4，9，3 左耳：6，2，7 呈现的速度为每秒2 个数字。然后，要求被试再现。\n结果：发现被试可用两种方式再现：1）以耳朵为单位，分别再现左右耳所接收的信息，如 493、627；2）以双耳同时接收到的信息为单位，按顺序成对地再现，如 46、92、37。以第一种方式再现的准确率为 65%，以第二种方式再现的准确率为20%。\n结论：每只耳朵相当于刺激输入的一个通道，而过滤器只允许每个通道的信息单独通过，注意再方式一只需装换 1 次，则效果好，在方式二至少转换 3 次，则效果差。"}], "experiment": {"title": "1.撰写《知觉与交流》", "body": "1.撰写《知觉与交流》\n2.改进双耳分听实验"}}, {"id": "巴德利", "cn": "巴德利", "en": "艾伦·巴德利", "col": "cog", "country": "英国", "born": 1934, "school": "心理学", "position": "主要研究记忆", "bio": "主要研究记忆", "avatar": "avatars/row_45.jpeg", "isSchool": true, "theories": [{"t": "工作记忆模型：作记忆是我们在处理当前任务时，对信息进行暂时存储和加工的记忆系统。它不同于短时记忆，因为短时记忆中的信息可能来自感觉记忆或长时记忆。", "d": ""}, {"t": "中央执行系统：是一个注意资源有限的控制系统，是工作记忆中最重要的成分，主要功能有：1）协调语音环路和视觉空间模版活动、2）注意资源的分配和控制、3）选择性的注意及转换策略", "d": ""}, {"t": "视觉空间模版：处理的是视觉的和空间的信息，干扰范式为其存在提供了依据", "d": ""}, {"t": "语音环路：处理以语音为基础的信息，分为：1）语音存储、2）发音复述功能", "d": "4）情景缓冲器：整合视觉、空间和言语信息的容量有限的成分，与长时记忆相连"}], "experiment": {"title": "工作记忆模型：作记忆是我们在处理当前任务时，对信息进行暂时存储和加工的记忆系统。它不同于短时记忆，因为短时记忆中的信息可能来自感觉记忆或长时记忆。", "body": "工作记忆模型：作记忆是我们在处理当前任务时，对信息进行暂时存储和加工的记忆系统。它不同于短时记忆，因为短时记忆中的信息可能来自感觉记忆或长时记忆。"}}, {"id": "加德纳", "cn": "加德纳", "en": "霍华德·加德纳", "col": "cog", "country": "美国", "born": 1943, "school": "发展心理学家、教育学家", "position": "多元智力理论的提出者", "bio": "多元智力理论的提出者", "avatar": "avatars/row_46.jpeg", "isSchool": true, "theories": [{"t": "多元智能理论：加德纳最为人知的成就是提出了多元智能理论。他认为，人的智力结构中存在着多种相对独立的智力，这些智力以不同方式、不同程度有机地组合在一起，使得每个人的智力各具特点。最初，他提出了八种智能，后来在1999年又增加了自然观察智力和存在智力，形成了九种智能的理论框架。", "d": ""}, {"t": "言语智力：包括说话、阅读、书写的能力。", "d": "逻辑-数理智力：指数字运算与逻辑思考的能力以及科学分析的能力。\n音乐智力：包括对声音的辨识与韵律表达的能力。\n运动智力：包括支配肢体以完成精密作业的能力。\n人际智力：包括与人交往且和睦相处的能力。\n自知智力：包括认识自己并选择自己生活方向的能力。\n自然观察智力：指人们辨别生物以及对自然景物敏锐的注意力。\n存在智力：指陈述、思考有关生与死、身体与心理世界的最终命运等的倾向性。\n空间智力（在八种智能的框架中提及，后融入视觉-空间智力）：指感受、辨别、记忆和改变物体的空间关系并借此表达思想和感情的能力。"}], "experiment": {"title": "多元智能理论：加德纳最为人知的成就是提出了多元智能理论。他认为，人的智力结构中存在着多种相对独立的智力，这些智力以不同方式、不同程度有机地组合在一起，使得每个人的智力各具特点。最初，他提出了八种智能，", "body": "多元智能理论：加德纳最为人知的成就是提出了多元智能理论。他认为，人的智力结构中存在着多种相对独立的智力，这些智力以不同方式、不同程度有机地组合在一起，使得每个人的智力各具特点。最初，他提出了八种智能，后来在1999年又增加了自然观察智力和存在智力，形成了九种智能的理论框架。"}}, {"id": "斯腾伯格", "cn": "斯腾伯格", "en": "罗伯特·斯滕伯格", "col": "cog", "country": "美国", "born": 1949, "school": "心理学家、认知心理学家", "position": "智力三元理论", "bio": "智力三元理论", "avatar": "avatars/row_47.jpeg", "isSchool": true, "theories": [{"t": "成分智力（componential intelligence） 指个人在问题情境中运用知识分析资料，通过思维、判断推理以达到问题解决的能力。它包含有三种机能成分。一是元成分（metacomponents），是指人们决定智力问题性质、选择解决问题的策略以及分配资源的过程。例如，一个好的阅读者在阅读时分配在每一段落上的时间是与他要从该段落中准备吸收的知识相一致的。这个决定就是由智力的元成分控制的。二是执行成分（performance components），是指人实际执行任务的过程,如词法存取和工作记忆。三是知识习得成分（knowledgeacquisition components），是指个人筛选相关信息并对已有知识加以整合从而获得新知识的过程。", "d": "经验智力（experiential intelligence） 指个人运用已有经验解决新问题时整合不同观念所形成的创造能力。例如，一个有经验智力的人比无此智力的人能够更有效地适应新的环境；他能较好地分析情况，用脑筋去解决问题，即使是从未遇到过的问题。经过多次解决某个问题之后，有经验智力的人就能不假思索、自动地启动程序来解决该问题，从而把节省下来的心理资源用在别的工作上。有些人能很快做到，有些人却难以做到这一点。这种能力就称为经验智力。\n情境智力（contextual intelligence） 指个人在日常生活中应用学得的知识经验解决生活实际问题的能力。例如，在不同的文化中人们应对日常生活实际问题的能力是不同的。区分有毒和无毒植物是从事狩猎、采集的部落人们的重要能力，而就业面试则是工业化社会的一种重要情境智力，他们的情境智力是不同的。"}, {"t": "成功智力：", "d": "分析性智力（解决问题和判定思维成果的质量，强调比较、判断、评估等分析思维能力）、创造性智力（发现、创造、想象和假设等创造思维的能力）、实践性智力（解决实际生活中问题的能力）\n爱情三角理论：\n斯滕伯格认为构成爱情的是亲密、激情与承诺三种元素。根据这三种元素的不同组合情况，斯滕伯格将爱情分为八种。"}], "experiment": {"title": "成分智力（componential intelligence） 指个人在问题情境中运用知识分析资料，通过思维、判断推理以达到问题解决的能力。它包含有三种机能成分。一是元成分（metacomponent", "body": "成分智力（componential intelligence） 指个人在问题情境中运用知识分析资料，通过思维、判断推理以达到问题解决的能力。它包含有三种机能成分。一是元成分（metacomponents），是指人们决定智力问题性质、选择解决问题的策略以及分配资源的过程。例如，一个好的阅读者在阅读时分配在每一段落上的时间是与他要从该段落中准备吸收的知识相一致的。这个决定就是由智力的元成分控制的。二是执行成分（performance components），是指人实际执行任务的过程,如词法存取和工作记忆。三是知识习得成分（knowledgeacquisition components），是指个人筛选相关信息并对已有知识加以整合从而获得新知识的过程。\n经验智力（experiential intelligence） 指个人运用已有经验解决新问题时整合不同观念所形成的创造能力。例如，一个有经验智力的人比无此智力的人能够更有效地适应新的环境；他能较好地分析情况，用脑筋去解决问题，即使是从未遇到过的问题。经过多次解决某个问题之后，有经验智力的人就能不假思索、自动地启动程序来解决该问题，从而把节省下来的心理资源用在别的工作上。有些人能很快做到，有些人却难以做到这一点。这种能力就称为经验智力。\n情境智力（contextual intelligence） 指个人在日常生活中应用学得的知识经验解决生活实际问题的能力。例如，在不同的文化中人们应对日常生活实际问题的能力是不同的。区分有毒和无毒植物是从事狩猎、采集的部落人们的重要能力，而就业面试则是工业化社会的一种重要情境智力，他们的情境智力是不同的。"}}, {"id": "斯腾伯格48", "cn": "斯腾伯格", "en": "扫罗·斯腾伯格", "col": "cog", "country": "美国", "born": 1949, "school": "", "position": "在认知与神经科学（其主要研究知觉、记忆和信息处理）语言学、人工智能乃至艺术心理研究", "bio": "在认知与神经科学（其主要研究知觉、记忆和信息处理）语言学、人工智能乃至艺术心理研究", "avatar": "avatars/row_48.jpeg", "isSchool": true, "theories": [{"t": "反应时——加因素法理论（Additive Factors Method）", "d": "研究短时记忆\n除了信息提取方式外，斯腾伯格和其他研究者还对短时记忆的其他特征进行了深入研究。这些特征包括：\n保持时间：短时记忆的保持时间相对较短，通常只有几分钟或更短的时间。在没有复述的情况下，短时记忆的信息会迅速遗忘。\n信息容量：短时记忆的容量有限，通常为7±2个项目（或称为组块）。这些项目可以是字母、数字、单词或其他信息单元。通过组块的方式，可以扩大短时记忆的容量。\n信息编码：短时记忆中的信息主要以语音形式进行编码，但也可以以形象和语义的形式存储。这种编码方式使得个体能够更快地提取和识别信息。"}], "experiment": {"title": "反应时——加因素法理论（Additive Factors Method）", "body": "反应时——加因素法理论（Additive Factors Method）\n研究短时记忆\n除了信息提取方式外，斯腾伯格和其他研究者还对短时记忆的其他特征进行了深入研究。这些特征包括：\n保持时间：短时记忆的保持时间相对较短，通常只有几分钟或更短的时间。在没有复述的情况下，短时记忆的信息会迅速遗忘。\n信息容量：短时记忆的容量有限，通常为7±2个项目（或称为组块）。这些项目可以是字母、数字、单词或其他信息单元。通过组块的方式，可以扩大短时记忆的容量。\n信息编码：短时记忆中的信息主要以语音形式进行编码，但也可以以形象和语义的形式存储。这种编码方式使得个体能够更快地提取和识别信息。"}}, {"id": "卡尼曼", "cn": "卡尼曼", "en": "丹尼尔·卡尼曼", "col": "cog", "country": "以色列/美国", "born": 1934, "died": 2024, "school": "认知心理学家", "position": "注意的衰减理论提出者", "bio": "注意的衰减理论提出者", "avatar": "avatars/row_49.jpeg", "isSchool": true, "theories": [{"t": "前景理论：大多数人在面临获得的时候是风险规避，面临损失的时候是风险偏好", "d": "提出“厌恶损失”概念-人们对损失比对获得更敏感"}, {"t": "人在决策时采用启发式策略：", "d": "1）代表性启发/表征性启发\n2）易得性启发/可得性启发\n3）锚定和调整启发法"}], "experiment": {"title": "1.前景理论：大多数人在面临获得的时候是风险规避，面临损失的时候是风险偏好", "body": "1.前景理论：大多数人在面临获得的时候是风险规避，面临损失的时候是风险偏好\n提出“厌恶损失”概念-人们对损失比对获得更敏感"}}, {"id": "比内", "cn": "比内", "en": "阿尔弗雷德·比奈", "col": "measure", "country": "法国", "born": 1857, "died": 1911, "school": "实验心理学家、智力测验的创始人", "position": "智力测验之父 法国机能主义心理学思想的代表", "bio": "智力测验之父\n法国机能主义心理学思想的代表", "avatar": "avatars/row_51.jpeg", "tag": "心理测量", "theories": [{"t": "1904年，法国公共教育部长任命比奈为智力落后儿童委员会委员，要求该委员会就巴黎学校中智力落后儿童的教育方法提出建议。", "d": "在佩雷·沃克卢斯精神病院医生T.西蒙的协助下，比奈用了不到一年的时间就为小学正常与异常儿童的智力水平诊断制定了新的方法。\n1905年，比奈在第11期《心理学年报》上发表了关于这一研究的论述。这一测验是由一系列难度逐渐增大的项目组成的。--是世界上第一个智力测验\n1908年，经过修改和增订，终于形成了著名的《比奈-西蒙智力量表》。该量表不仅增加了试题，而且使试题的难度随年龄的增大而上升，量表的适用年龄是3~16岁。--提出第一个年龄量表，即智龄\n1911年，发表了该量表的第二次修订本，增加了一些新的项目，并舍弃了一些过于依赖学校知识的旧项目，将适用年龄改为3~18岁。"}], "experiment": {"title": "1904年，法国公共教育部长任命比奈为智力落后儿童委员会委员，要求该委员会就巴黎学校中智力落后儿童的教育方法提出建议。", "body": "1904年，法国公共教育部长任命比奈为智力落后儿童委员会委员，要求该委员会就巴黎学校中智力落后儿童的教育方法提出建议。\n在佩雷·沃克卢斯精神病院医生T.西蒙的协助下，比奈用了不到一年的时间就为小学正常与异常儿童的智力水平诊断制定了新的方法。\n1905年，比奈在第11期《心理学年报》上发表了关于这一研究的论述。这一测验是由一系列难度逐渐增大的项目组成的。--是世界上第一个智力测验\n1908年，经过修改和增订，终于形成了著名的《比奈-西蒙智力量表》。该量表不仅增加了试题，而且使试题的难度随年龄的增大而上升，量表的适用年龄是3~16岁。--提出第一个年龄量表，即智龄\n1911年，发表了该量表的第二次修订本，增加了一些新的项目，并舍弃了一些过于依赖学校知识的旧项目，将适用年龄改为3~18岁。"}}, {"id": "推孟", "cn": "推孟", "en": "刘易斯·麦迪逊·推孟", "col": "measure", "country": "美国", "born": 1877, "died": 1956, "school": "智商之父", "position": "斯坦福-比内量表", "bio": "斯坦福-比内量表", "avatar": "avatars/row_52.jpeg", "tag": "心理测量", "theories": [{"t": "1916年版-首次引入比率智商（强调绝对水平）", "d": "1960年版--舍弃比率智商，引入离差智商（强调相对水平）\nIQ=16Z+100"}, {"t": "测验内容与结构", "d": "斯坦福-比内量表包含多个分测验，这些分测验旨在评估个体的言语推理、抽象/视觉推理、数量推理和短时记忆等认知能力。\n测验程序以个别方式进行，通常幼儿不超过30~40分钟，成人被试不多于90分钟。\n测验从稍低于被试实际年龄组的项目开始，如果未通过则降到低一级的年龄组继续，直至某组全部项目都通过，再依次实施较大的各年龄组，直至某组的项目全部失败为止。"}], "experiment": {"title": "1916年版-首次引入比率智商（强调绝对水平）", "body": "1916年版-首次引入比率智商（强调绝对水平）\n1960年版--舍弃比率智商，引入离差智商（强调相对水平）\nIQ=16Z+100"}}, {"id": "斯皮尔曼", "cn": "斯皮尔曼", "en": "查尔斯·爱德华·斯皮尔曼", "col": "measure", "country": "英国", "born": 1863, "died": 1945, "school": "心理学、逻辑学教授", "position": "", "bio": "", "avatar": "avatars/row_53.jpeg", "tag": "心理测量", "theories": [{"t": "斯皮尔曼等级相关（皮尔逊积差相关的备胎），适用范围：", "d": "1）只有两列变量，变量为顺序型数据或称名数据\n2）两列变量之间的关系应该是线性的\n3）当研究考察的变量的总体分布为非正态"}, {"t": "智力二因素论：", "d": "类智力内涵，包括着两种因素：一为普通因素（general factor）简称G因素；另一为特殊因素（specific factor），简称S因素。按斯皮尔曼的解释，人的普通能力系得自先天遗传，主要表现在一般性生活活动上，从而显示个人能力的高低。 S因素代表的特殊能力，只与少数生活活动有关，是个人在某方面表现的异于别人的能力。一般智力测验所测量者，就是普通能力。"}], "experiment": {"title": "1.斯皮尔曼等级相关（皮尔逊积差相关的备胎），适用范围：", "body": "1.斯皮尔曼等级相关（皮尔逊积差相关的备胎），适用范围：\n1）只有两列变量，变量为顺序型数据或称名数据\n2）两列变量之间的关系应该是线性的\n3）当研究考察的变量的总体分布为非正态"}}, {"id": "韦克斯勒", "cn": "韦克斯勒", "en": "大卫.韦克斯勒", "col": "measure", "country": "美国", "born": 1896, "died": 1981, "school": "医学心理学家，韦氏智力测验的编制者。", "position": "韦氏智力量表 继比内-西蒙智力量表之后为国际通用的另一套智力量表。", "bio": "韦氏智力量表\n继比内-西蒙智力量表之后为国际通用的另一套智力量表。", "avatar": "avatars/row_54.jpeg", "tag": "心理测量", "theories": [{"t": "IQ=15Z+100", "d": "先后编制了适用于不同年龄段人群的韦氏智力量表，包括韦氏儿童智力量表（WISC）、韦氏成人智力量表（WAIS）和韦氏学龄前及幼儿智力量表（WPPSI）等。"}, {"t": "测验内容与结构", "d": "韦氏智力量表包含多个分测验，这些分测验旨在评估个体的知识、领悟、算术、相似性、数字广度、词汇、数字符号、图画填充、木块图、图片排列、图形拼凑等认知能力。\n测验程序以个别方式进行，通常需要1~1.5小时完成。测验结果通过计算原始分数并转换为量表分数和智商分数来表示。"}], "experiment": {"title": "IQ=15Z+100", "body": "IQ=15Z+100\n先后编制了适用于不同年龄段人群的韦氏智力量表，包括韦氏儿童智力量表（WISC）、韦氏成人智力量表（WAIS）和韦氏学龄前及幼儿智力量表（WPPSI）等。"}}, {"id": "奥尔波特", "cn": "奥尔波特", "en": "高尔顿·威拉德·奥尔波特", "col": "measure", "country": "美国", "born": 1897, "died": 1967, "school": "心理学家 / 社会心理学家", "position": "现代个性心理学创始人之一 特质理论的始创人", "bio": "现代个性心理学创始人之一\n特质理论的始创人", "avatar": "avatars/row_55.jpeg", "tag": "心理测量", "theories": [{"t": "1929年第九届国际心理学大会上发表了题为《什么是个性特质》的论文，提出将特质作为个性的基本单位。", "d": "认为特质是人格的基础，是心理组织的基本建构单位，是每个人以其生理为基础而形成的一些稳定的性格特征。"}, {"t": "奥尔波特将人格特质区分为共同特质（common traits）和个人特质（personal traits）。共同特质是人所共有的一些特质，所有人都具有这些人格特质，人与人之间都可以在这些特质上分别加以比较，如外向性，任何人都具备这一特质，个体之间的差异只在于不同的人具备此种特质的多寡或强弱不同而已。个人特质是个人所特有的，代表着个人的独特的行为倾向。", "d": "个人特质又分为："}, {"t": "首要特质（cardinal trait）是指最能代表一个人的特点的人格特质，它在个人特质结构中处于主导性的地位，影响着这个人的行为的各个方面。", "d": ""}, {"t": "中心特质（central trait）是指能代表一个人的性格的核心成分。", "d": ""}, {"t": "次要特质（secondary trait）是指一个人的某种具体的偏好或反应倾向，如偏好某种颜色的衣服，闲暇时喜欢收拾房间，等等。", "d": ""}], "experiment": {"title": "1929年第九届国际心理学大会上发表了题为《什么是个性特质》的论文，提出将特质作为个性的基本单位。", "body": "1929年第九届国际心理学大会上发表了题为《什么是个性特质》的论文，提出将特质作为个性的基本单位。\n认为特质是人格的基础，是心理组织的基本建构单位，是每个人以其生理为基础而形成的一些稳定的性格特征。"}}, {"id": "卡特尔", "cn": "卡特尔", "en": "雷蒙德·卡特尔", "col": "measure", "country": "美国", "born": 1905, "died": 1998, "school": "心理学家", "position": "最早应用因素分析法研究人格 16种人格因素测验16PF", "bio": "最早应用因素分析法研究人格\n16种人格因素测验16PF", "avatar": "avatars/row_56.jpeg", "tag": "心理测量", "theories": [{"t": "流体和晶体智力理论", "d": "将智力分为两类：其一为流体智力（fluid intelligences），指一般的学习和行为能力，由速度、能量、快速适应新环境的测验度量，如逻辑推理测验、记忆广度测验、解决抽象问题和信息加工速度测验等，流体智力的主要作用是学习新知识和解决新异问题，它主要受人的生物学因素影响。其二为晶体智力（Crystallized Intelligences）指已获得的知识和技能，由词汇、社会推理以及问题解决等测验度量，晶体智力测量的是知识经验，是人们学会的东西，它的主要作用是处理熟悉的、已加工过的问题。晶体智力一部分是由教育和经验决定的，一部分是早期流体智力发展的结果。"}], "experiment": {"title": "1.流体和晶体智力理论", "body": "1.流体和晶体智力理论\n将智力分为两类：其一为流体智力（fluid intelligences），指一般的学习和行为能力，由速度、能量、快速适应新环境的测验度量，如逻辑推理测验、记忆广度测验、解决抽象问题和信息加工速度测验等，流体智力的主要作用是学习新知识和解决新异问题，它主要受人的生物学因素影响。其二为晶体智力（Crystallized Intelligences）指已获得的知识和技能，由词汇、社会推理以及问题解决等测验度量，晶体智力测量的是知识经验，是人们学会的东西，它的主要作用是处理熟悉的、已加工过的问题。晶体智力一部分是由教育和经验决定的，一部分是早期流体智力发展的结果。"}}, {"id": "艾森克", "cn": "艾森克", "en": "汉斯 J. 艾森克", "col": "measure", "country": "英国", "born": 1916, "died": 1997, "school": "心理学家", "position": "艾森克人格问卷（EPQ）", "bio": "艾森克人格问卷（EPQ）", "avatar": "avatars/row_57.png", "tag": "心理测量", "theories": [{"t": "现代人格科学理论的主要贡献者，并且在建立精神紊乱的行为治疗中扮演关键角色。", "d": "主要从事人格、智力、行为遗传学和行为理论等方面的研究。提出三因素模型"}], "experiment": {"title": "现代人格科学理论的主要贡献者，并且在建立精神紊乱的行为治疗中扮演关键角色。", "body": "现代人格科学理论的主要贡献者，并且在建立精神紊乱的行为治疗中扮演关键角色。\n主要从事人格、智力、行为遗传学和行为理论等方面的研究。提出三因素模型"}}, {"id": "维果茨基", "cn": "维果茨基", "en": "维果茨基", "col": "dev", "country": "前苏联", "born": 1896, "died": 1934, "school": "心理学家", "position": "鲁利亚的老师 主要研究儿童发展与教育心理，着重探讨思维和语言、儿童学习与发展的关系问题", "bio": "鲁利亚的老师\n主要研究儿童发展与教育心理，着重探讨思维和语言、儿童学习与发展的关系问题", "avatar": "avatars/row_59.jpeg", "tag": "毕生发展", "theories": [{"t": "维果茨基与皮亚杰是同时期的人物。但不同于皮亚杰认知发展泛宇宙统一的观点，维果茨基的理论强调文化、社会对儿童认知发展的影响。", "d": ""}, {"t": "最近发展区", "d": "实际的发展水平与潜在的发展水平之间的差距。前者由儿童独立解决问题的能力而定，后者则是指在成人的指导下或是与能力较强的同伴合作时，儿童能够解决问题的能力"}, {"t": "内化学说", "d": "“内化学说”的基础是工具理论，工具分为两类，一类是物质工具（各种器具、机械），另一类是心理工具（符号、标记、语言等）"}], "experiment": {"title": "维果茨基与皮亚杰是同时期的人物。但不同于皮亚杰认知发展泛宇宙统一的观点，维果茨基的理论强调文化、社会对儿童认知发展的影响。", "body": "维果茨基与皮亚杰是同时期的人物。但不同于皮亚杰认知发展泛宇宙统一的观点，维果茨基的理论强调文化、社会对儿童认知发展的影响。"}}, {"id": "科尔伯格", "cn": "科尔伯格", "en": "劳伦斯·科尔伯格", "col": "dev", "country": "美国", "born": 1927, "died": 1987, "school": "儿童发展心理学家", "position": "继承并发展了皮亚杰的道德发展理论，着重研究儿童道德认知的发展，提出了“道德发展阶段”理论", "bio": "继承并发展了皮亚杰的道德发展理论，着重研究儿童道德认知的发展，提出了“道德发展阶段”理论", "avatar": "avatars/row_60.jpeg", "tag": "毕生发展", "theories": [{"t": "两难故事法（海因茨偷药）", "d": "这是一个虚构的故事，当这样一个道德两难故事呈现给孩子们之后，围绕这个故事提出了一系列问题，让儿童讨论，以此来研究儿童道德判断所依据的准则及其道德发展水平。"}], "experiment": {"title": "1.两难故事法（海因茨偷药）", "body": "1.两难故事法（海因茨偷药）\n这是一个虚构的故事，当这样一个道德两难故事呈现给孩子们之后，围绕这个故事提出了一系列问题，让儿童讨论，以此来研究儿童道德判断所依据的准则及其道德发展水平。"}}, {"id": "艾斯沃斯", "cn": "艾斯沃斯", "en": "玛丽·艾因斯沃斯", "col": "dev", "country": "美国加拿大", "born": 1913, "died": 1999, "school": "早起情感依恋的研究", "position": "依恋理论：玛丽·爱因斯沃斯在鲍尔比依恋理论的基础上，进行了著名的陌生情境实验。在这个实验中，婴儿和他们的母亲或主要照顾者被引导进入一个陌生的房间，然后在一系列情境中观察他们的反应，包括母亲的离开和返回。通过这一实验，爱因斯沃斯进一步验证了鲍尔比的依恋理论，并提出了适用于婴幼儿的不同依恋模式。", "bio": "依恋理论：玛丽·爱因斯沃斯在鲍尔比依恋理论的基础上，进行了著名的陌生情境实验。在这个实验中，婴儿和他们的母亲或主要照顾者被引导进入一个陌生的房间，然后在一系列情境中观察他们的反应，包括母亲的离开和返回。通过这一实验，爱因斯沃斯进一步验证了鲍尔比的依恋理论，并提出了适用于婴幼儿的不同依恋模式。", "avatar": "avatars/row_61.jpeg", "tag": "毕生发展", "theories": [{"t": "安全依恋：这类个体在人际关系中表现出稳定、积极和信任的态度。他们通常能够轻松地与他人建立亲密关系，并在需要时寻求支持和安慰。在面对分离或挑战时，他们能够保持冷静和理性，相信自己的价值和他人的可靠性。", "d": "焦虑/矛盾型不安全依恋：这类个体对人际关系表现出高度的依赖和不安。他们渴望与他人建立亲密关系，但同时又担心被抛弃或受到伤害。在面对分离或挑战时，他们往往会产生强烈的焦虑和不安，并可能表现出过度依赖、控制或嫉妒的行为。\n回避型不安全依恋：这类个体对亲密关系表现出冷漠和疏离的态度。他们通常不愿意与他人建立过于亲密的关系，并可能避免寻求支持和安慰。在面对分离或挑战时，他们往往会采取逃避或忽视的策略，以避免感受到痛苦和不安。\n恐惧型（混乱型）不安全依恋：这是后来由玛丽·梅进一步提出的一种依恋类型。这类个体在人际关系中表现出复杂和矛盾的态度。他们可能同时拥有焦虑型和回避型依恋的特点，对亲密关系既渴望又害怕。在面对分离或挑战时，他们可能会表现出混乱、不稳定和冲突的行为。"}]}, {"id": "乔姆斯基", "cn": "乔姆斯基", "en": "诺姆·乔姆斯基", "col": "dev", "country": "美国", "born": 1928, "school": "哲学家", "position": "《生成语法》被认为是20世纪理论语言学研究上最伟大的贡献。", "bio": "《生成语法》被认为是20世纪理论语言学研究上最伟大的贡献。", "avatar": "avatars/row_62.jpeg", "tag": "毕生发展", "theories": [{"t": "转化生成说", "d": "即生成语法：生成语法理论将语言分为两个层次，即表面结构和深层结构。表面结构是可以直接观察到的句子形式和语法规则，而深层结构则是表达思想和意义的潜在层次。他提出了“转换语法”的概念，认为深层结构通过转换规则得到表层结构，这种转换规则使语言具有创造性和灵活性。"}, {"t": "语言获得装置LAD", "d": "语言习得机制：乔姆斯基认为，人类具有天生的语言习得机制和语言能力，这是人类特有的、固有的认知能力，而不仅仅是一种交流工具。"}], "experiment": {"title": "1.转化生成说", "body": "1.转化生成说\n即生成语法：生成语法理论将语言分为两个层次，即表面结构和深层结构。表面结构是可以直接观察到的句子形式和语法规则，而深层结构则是表达思想和意义的潜在层次。他提出了“转换语法”的概念，认为深层结构通过转换规则得到表层结构，这种转换规则使语言具有创造性和灵活性。"}}, {"id": "加涅", "cn": "加涅", "en": "罗伯特·米尔斯·加涅", "col": "learn", "country": "美国", "born": 1916, "died": 2002, "school": "教育心理学家", "position": "学习的繁简水平分类 学习的信息加工模式 学习阶段及教学设计", "bio": "学习的繁简水平分类\n学习的信息加工模式\n学习阶段及教学设计", "avatar": "avatars/row_64.jpeg", "tag": "学习心理", "theories": [{"t": "学习层级结构理论（八层次）", "d": "该理论强调学习是有层次的，由简单到复杂，逐步深入：\n信号学习、刺激-反应学习、连锁学习、言语联想学习、辨别学习、概念学习、规则的学习以及解决问题的学习。\n（修正后6层：连锁学习、辨别头发、具体概念学习、定义概念学习、规则学习、解决问题的学习）"}, {"t": "学习结果分类五种类型：", "d": "言语信息：掌握以言语信息传递的内容，学习结果以言语信息表现出来，帮助学生解决“是什么”的问题。\n智慧技能：包括辨别、概念、规则、高级规则（解决问题）等，帮助学生解决“怎么做”的问题。\n认知策略：学习者用以支配自己的注意、学习、记忆和思维的有内在组织的才能，使得学习过程的执行控制成为可能。\n态度：通过学习获得的内部状态，这种状态影响着个人对某种事物、人物及事件所采取的行动。\n动作技能：又称运动技能，如体操运动、写字技能，是能力的一个组成部分。"}, {"t": "学习阶段及教学设计", "d": ""}], "experiment": {"title": "1.学习层级结构理论（八层次）", "body": "1.学习层级结构理论（八层次）\n该理论强调学习是有层次的，由简单到复杂，逐步深入：\n信号学习、刺激-反应学习、连锁学习、言语联想学习、辨别学习、概念学习、规则的学习以及解决问题的学习。\n（修正后6层：连锁学习、辨别头发、具体概念学习、定义概念学习、规则学习、解决问题的学习）"}}, {"id": "布鲁纳", "cn": "布鲁纳", "en": "杰罗姆·布鲁纳", "col": "learn", "country": "美国", "born": 1915, "died": 2016, "school": "教育心理学家、认知心理学家", "position": "假设检验说  认知-发现学习说（认知-结构教学论）", "bio": "假设检验说\n\n认知-发现学习说（认知-结构教学论）", "avatar": "avatars/row_65.jpeg", "tag": "学习心理", "theories": [{"t": "假设概念说", "d": "1）概念形成实验--81张图片（图形、图数、颜色、边线）\n2）概念形成策略：保守性聚焦、冒险性聚焦、同时性扫描、继时性扫描   “聚焦的是属性、扫描的是假设，图形颜色等是属性，完整的图是假设，假设是属性的结合”"}, {"t": "认知-发现学习说", "d": "反对以强化学习为主的程序教学，主张学习的目的在于发现学习的方式，认知-结构教学论：\n1）认知表征理论（动作表征阶段、映像表征阶段、符号表征阶段）\n2）认知学习观（获得、转化、评价）\n3）学习与教学的基本原则（注重知识结构、发展学习的准备性、培养直觉思维、激发内在动机）\n4）学习的方式-发现学习（定义：提出问题、做出假设、验证假设、形成结论；发现学习的作用、发现学习的局限）"}, {"t": "迁移理论", "d": "迁移：把习得的编码系统用于新的事例中\n正迁移：是适当的编码系统应用于新的事例\n负迁移：把习得的编码系统错误的应用于新的事例\n两类：1.特殊迁移（主要是动作技能、机械学习的迁移）2.非特殊迁移（原理和态度的迁移）"}], "experiment": {"title": "1.假设概念说", "body": "1.假设概念说\n1）概念形成实验--81张图片（图形、图数、颜色、边线）\n2）概念形成策略：保守性聚焦、冒险性聚焦、同时性扫描、继时性扫描   “聚焦的是属性、扫描的是假设，图形颜色等是属性，完整的图是假设，假设是属性的结合”"}}, {"id": "奥苏伯尔", "cn": "奥苏伯尔", "en": "戴维·保罗·奥苏贝尔", "col": "learn", "country": "美国", "born": 1918, "died": 2008, "school": "认知教育心理学家", "position": "有意义学习 认知同化理论 知识同化说", "bio": "有意义学习\n认知同化理论\n知识同化说", "avatar": "avatars/row_66.png", "tag": "学习心理", "theories": [{"t": "学习性质分类：", "d": "按学习形式：接收学习和发现学习\n按学习性质：机械学习和有意义学习"}, {"t": "有意义学习理论：", "d": "与机械学习相对，有意义学习强调将新知识与学习者原有知识建立起非人为（内在的）的和实质性（非字面的）的联系。奥苏贝尔认为，这种联系的建立是学习过程的核心，它使得新知识不仅仅是死记硬背的内容，而是能够被学习者理解和应用的知识。有意义学习不仅关注学习材料本身的逻辑意义，还强调学习者必须具备有意义学习的心向，即积极主动地将新知识与已有知识相联系。这一理论为教育心理学提供了重要的理论支撑，揭示了学习过程的本质和规律。"}], "experiment": {"title": "1.学习性质分类：", "body": "1.学习性质分类：\n按学习形式：接收学习和发现学习\n按学习性质：机械学习和有意义学习"}}, {"id": "麦克里兰", "cn": "麦克里兰", "en": "指戴维·麦克利兰", "col": "learn", "country": "美国", "born": 1918, "died": 2008, "school": "社会心理学家", "position": "成就动机理论---三重需要理论  胜任素质之父", "bio": "成就动机理论---三重需要理论\n\n胜任素质之父", "avatar": "avatars/row_67.jpeg", "tag": "学习心理", "theories": [{"t": "三重需要理论（成就激励理论）：麦克利兰在20世纪50年代提出了三重需要理论，探讨了人类动机的三个核心需求，即成就需要、权力需要和亲和需要。这一理论为理解人类动机和行为提供了重要的理论框架。", "d": "成就需要：争取成功希望做得最好的需要。麦克利兰认为，具有强烈的成就需要的人渴望将事情做得更为完美，提高工作效率，获得更大的成功，他们追求的是在争取成功的过程中克服困难、解决难题、努力奋斗的乐趣，以及成功之后的个人的成就感，他们并不看重成功所带来的物质奖励。\n权力需要：影响或控制他人且不受他人控制的需要。不同人对权力的渴望程度也有所不同。权力需要较高的人喜欢支配、影响他人，喜欢对别人“发号施令”，注重争取地位和影响力。\n亲和需要：建立友好亲密的人际关系的需要，即寻求被他人喜爱和接纳的一种愿望。高亲和需要的人更倾向于与他人进行交往，至少是为他人着想，这种交往会给他带来愉快。"}], "experiment": {"title": "三重需要理论（成就激励理论）：麦克利兰在20世纪50年代提出了三重需要理论，探讨了人类动机的三个核心需求，即成就需要、权力需要和亲和需要。这一理论为理解人类动机和行为提供了重要的理论框架。", "body": "三重需要理论（成就激励理论）：麦克利兰在20世纪50年代提出了三重需要理论，探讨了人类动机的三个核心需求，即成就需要、权力需要和亲和需要。这一理论为理解人类动机和行为提供了重要的理论框架。\n成就需要：争取成功希望做得最好的需要。麦克利兰认为，具有强烈的成就需要的人渴望将事情做得更为完美，提高工作效率，获得更大的成功，他们追求的是在争取成功的过程中克服困难、解决难题、努力奋斗的乐趣，以及成功之后的个人的成就感，他们并不看重成功所带来的物质奖励。\n权力需要：影响或控制他人且不受他人控制的需要。不同人对权力的渴望程度也有所不同。权力需要较高的人喜欢支配、影响他人，喜欢对别人“发号施令”，注重争取地位和影响力。\n亲和需要：建立友好亲密的人际关系的需要，即寻求被他人喜爱和接纳的一种愿望。高亲和需要的人更倾向于与他人进行交往，至少是为他人着想，这种交往会给他带来愉快。"}}, {"id": "韦纳", "cn": "韦纳", "en": "伯纳德·韦纳", "col": "learn", "country": "美国", "born": 1918, "died": 2008, "school": "认知心理学家", "position": "归因理论（三维归因理论）", "bio": "归因理论（三维归因理论）", "avatar": "avatars/row_68.jpeg", "tag": "学习心理", "theories": [{"t": "归因理论", "d": "归因理论是韦纳最重要的贡献之一。该理论最初由海德提出，但韦纳将其扩展到了成就领域。韦纳认为，人们对行为成败原因的分析可归纳为以下六个因素：\n能力：个人评估自己是否胜任某项工作。\n努力：个人反省检讨在工作过程中是否尽力而为。\n任务难度：个人凭经验判定某项任务的困难程度。\n运气：个人自认为此次成败是否与运气有关。\n身心状况：个人的身体和心理状态对行为结果的影响。\n外界环境：除上述因素外，其他可能影响行为结果的外在因素。"}], "experiment": {"title": "归因理论", "body": "归因理论\n归因理论是韦纳最重要的贡献之一。该理论最初由海德提出，但韦纳将其扩展到了成就领域。韦纳认为，人们对行为成败原因的分析可归纳为以下六个因素：\n能力：个人评估自己是否胜任某项工作。\n努力：个人反省检讨在工作过程中是否尽力而为。\n任务难度：个人凭经验判定某项任务的困难程度。\n运气：个人自认为此次成败是否与运气有关。\n身心状况：个人的身体和心理状态对行为结果的影响。\n外界环境：除上述因素外，其他可能影响行为结果的外在因素。"}}, {"id": "阿希", "cn": "阿希", "en": "所罗门·阿希", "col": "gestalt", "country": "美国", "born": 1907, "died": 1996, "school": "社会心理学家", "position": "从众实验 格式塔心理学派创始人之一", "bio": "从众实验\n格式塔心理学派创始人之一", "avatar": "avatars/row_70.png", "isSchool": true, "theories": [{"t": "主要集中于特质的因素分析、测验编制以及文化因素和团体差异对测验分数的影响等方面", "d": ""}, {"t": "1952年，他写了一部教科书《社会心理学》，其中保留了许多格式塔心理学的信条。他著名的研究是群体中的从众（conformity）行为。阿希通过“线段实验”（1955－1956）来进行他的研究。他让被试坐在一张有七到九个人的桌子旁，真正的被试只有一个，其他的几个人都是为配合实验而故意安排的助手。阿希首先让他们看一张卡片，卡片上有一条直线，之后再看第二张卡片，卡片上有三条不同长度的直线，其中有一条很明显的是和第一张卡片上的直线长度相同，而这群人被要求轮流回答第二张卡片上哪一条直线的长度是和第一张卡片的长度相等，此时这名被试是坐在倒数第二个位子。这个答案是很明显的，而在大部分的试验中每个人会给予相同的答案，但在某一些被操纵的试验中，阿希的“助手”被指示要给予一个错误的答案，而阿希则在观察这样的情况会引发受试者怎样的从众行为。", "d": ""}, {"t": "阿希从众实验的结果表明，在群体压力下，个体容易出现从众现象。这种现象在现实生活中具有普遍性，对社会和个人均产生一定的影响。人们倾向于采纳符合社会主流观点的行为和意见，以避免被排斥或孤立。在实验中，当大多数人都给出相同（但错误）的答案时，个体可能会感到自己的判断与群体不符，从而选择从众。", "d": ""}], "experiment": {"title": "主要集中于特质的因素分析、测验编制以及文化因素和团体差异对测验分数的影响等方面", "body": "主要集中于特质的因素分析、测验编制以及文化因素和团体差异对测验分数的影响等方面"}}, {"id": "费斯汀格", "cn": "费斯汀格", "en": "利昂·费斯廷格", "col": "social", "country": "美国", "born": 1919, "died": 1989, "school": "社会心理学家", "position": "主要研究人的期望、抱负和决策，并用实验方法研究偏见、社会影响等社会心理学问题", "bio": "主要研究人的期望、抱负和决策，并用实验方法研究偏见、社会影响等社会心理学问题", "avatar": "avatars/row_71.jpeg", "tag": "社会心理", "theories": [{"t": "认知失调理论", "d": "此理论为Festinger于1957年的「认知失调论」一书中所提出，认知失调论的基本要义为，当个体面对新情境，必须表示自身的态度时，个体在心理上将出现新认知（新的理解）与旧认知（旧的信念）相互冲突的状况，为了消除此种因为不一致而带来紧张的不适感，个体在心理上倾向于采用两种方式进行自我调适，其一为对于新认知予以否认；另一为寻求更多新认知的讯息，提升新认知的可信度，藉以彻底取代旧认知，从而获致心理平衡。此理论于性质上为解释个体内在动机之主要理论，故而被广泛用以解释个体态度改变之重要依据。"}], "experiment": {"title": "认知失调理论", "body": "认知失调理论\n此理论为Festinger于1957年的「认知失调论」一书中所提出，认知失调论的基本要义为，当个体面对新情境，必须表示自身的态度时，个体在心理上将出现新认知（新的理解）与旧认知（旧的信念）相互冲突的状况，为了消除此种因为不一致而带来紧张的不适感，个体在心理上倾向于采用两种方式进行自我调适，其一为对于新认知予以否认；另一为寻求更多新认知的讯息，提升新认知的可信度，藉以彻底取代旧认知，从而获致心理平衡。此理论于性质上为解释个体内在动机之主要理论，故而被广泛用以解释个体态度改变之重要依据。"}}, {"id": "米尔格拉姆", "cn": "米尔格拉姆", "en": "斯坦利·米尔格兰姆", "col": "social", "country": "美国", "born": 1933, "died": 1984, "school": "社会心理学家", "position": "小世界实验-六度分隔理论 服从实验（服从的影响因素）", "bio": "小世界实验-六度分隔理论\n服从实验（服从的影响因素）", "avatar": "avatars/row_72.jpeg", "tag": "社会心理", "theories": [{"t": "六度分隔理论", "d": "亦称六度空间、小世界效应。假设世界上所有互不相识的人只需要很少中间人就能建立起联系。六度分隔理论（Six Degrees of Separation）后来1967年哈佛大学的心理学教授斯坦利·米尔格兰姆（Stanley Milgram，1933年—1984年）根据这概念做过一次连锁信实验，尝试证明平均只需六个人就可以联系任何两个互不相识的美国人。可是，超过三十年来这个理论所谓的人际连系网（例如上述的“世界上所有人”）仍然有所争议。从论文发表至今有关这方面的研究很少。不过，在应用层面方面却很多，特别是保险及传销业的从业员。现时在香港，一般保险经纪在完成交易之后，都会要求客户提供一个至少五人的新名单。另外，早在1980年代初期，《读者文摘》就已利用这理论，鼓励订户向公司推荐其他潜在订户。"}], "experiment": {"title": "六度分隔理论", "body": "六度分隔理论\n亦称六度空间、小世界效应。假设世界上所有互不相识的人只需要很少中间人就能建立起联系。六度分隔理论（Six Degrees of Separation）后来1967年哈佛大学的心理学教授斯坦利·米尔格兰姆（Stanley Milgram，1933年—1984年）根据这概念做过一次连锁信实验，尝试证明平均只需六个人就可以联系任何两个互不相识的美国人。可是，超过三十年来这个理论所谓的人际连系网（例如上述的“世界上所有人”）仍然有所争议。从论文发表至今有关这方面的研究很少。不过，在应用层面方面却很多，特别是保险及传销业的从业员。现时在香港，一般保险经纪在完成交易之后，都会要求客户提供一个至少五人的新名单。另外，早在1980年代初期，《读者文摘》就已利用这理论，鼓励订户向公司推荐其他潜在订户。"}}, {"id": "津巴多", "cn": "津巴多", "en": "菲利普·津巴多", "col": "social", "country": "美国", "born": 1933, "died": 2024, "school": "心理学家", "position": "斯坦福监狱实验（虚拟逐渐变成现实）", "bio": "斯坦福监狱实验（虚拟逐渐变成现实）", "avatar": "avatars/row_73.png", "tag": "社会心理", "theories": [{"t": "斯坦福监狱实验", "d": "1971年，津巴多在斯坦福大学心理学系大楼的地下室进行了著名的斯坦福监狱实验。他指派24名师范学院学生充当“囚犯”和“看守”，探究了环境对个体行为的影响。\n该实验揭示了人性在特定情境下的脆弱与复杂，并提出了著名的“路西法效应”，即好人如何在特定情境下变成恶人。这一理论对理解人类行为、群体动力学以及权力和权威的影响提供了深刻见解。"}, {"t": "害羞研究", "d": "斯坦福监狱实验之后，津巴多决定寻找利用心理学帮助人们的途径，于是他在门洛帕克（加利福尼亚州）设立了害羞诊所（The Shyness Clinic），专门治疗成人和儿童的害羞。\n他将其关于害羞的研究成果写成了几本畅销书，如《害羞：害羞是什么，该怎么做》和《害羞的孩子》等。"}], "experiment": {"title": "斯坦福监狱实验", "body": "斯坦福监狱实验\n1971年，津巴多在斯坦福大学心理学系大楼的地下室进行了著名的斯坦福监狱实验。他指派24名师范学院学生充当“囚犯”和“看守”，探究了环境对个体行为的影响。\n该实验揭示了人性在特定情境下的脆弱与复杂，并提出了著名的“路西法效应”，即好人如何在特定情境下变成恶人。这一理论对理解人类行为、群体动力学以及权力和权威的影响提供了深刻见解。"}}, {"id": "泰勒", "cn": "泰勒", "en": "弗雷德里克·温斯洛·泰勒", "col": "mgmt", "country": "美国", "born": 1856, "died": 1915, "school": "管理学家，经济学家", "position": "科学管理之父 代表作为《科学管理原理》 认为人是“经济人”（经济人假设最早由英国经济学家亚当·斯密(Adam Smith)提出《国富论》（1776年出版）", "bio": "科学管理之父\n代表作为《科学管理原理》\n认为人是“经济人”（经济人假设最早由英国经济学家亚当·斯密(Adam Smith)提出《国富论》（1776年出版）", "avatar": "avatars/row_75.jpeg", "tag": "管理心理", "theories": [{"t": "“搬运生铁块试验”和“铁锹试验”", "d": "改进了操作方法，训练了工人，结果使生铁块的搬运量提高3倍。铁锹试验是系统地研究铲上负载后，研究各种材料能够达到标准负载的锹的形状、规格，以及各种原料装锹的最好方法的问题。此外泰勒还对每一套动作的精确时间作了研究，从而得出了一个“一流工人”每天应该完成的工作量。"}]}, {"id": "韦伯76", "cn": "韦伯", "en": "马克斯·韦伯", "col": "mgmt", "country": "德国", "born": 1864, "died": 1920, "school": "社会学家、历史学家、政治学家、经济学家", "position": "现代社会科学的奠基人", "bio": "现代社会科学的奠基人", "avatar": "avatars/row_76.jpeg", "tag": "管理心理", "theories": [{"t": "组织理论及官僚制理论的提出：", "d": "韦伯被誉为“组织理论之父”，他提出了“理想的行政组织体系”理论，也被称为官僚制理论。这一理论强调组织的有效管理需要合理的权威结构、明确的管理职责和规范的管理程序。韦伯认为，组织应该具备分部—分层、集权—统一、指挥—服从等特征，以实现组织的理性化、专业化和效率化。"}], "experiment": {"title": "组织理论及官僚制理论的提出：", "body": "组织理论及官僚制理论的提出：\n韦伯被誉为“组织理论之父”，他提出了“理想的行政组织体系”理论，也被称为官僚制理论。这一理论强调组织的有效管理需要合理的权威结构、明确的管理职责和规范的管理程序。韦伯认为，组织应该具备分部—分层、集权—统一、指挥—服从等特征，以实现组织的理性化、专业化和效率化。"}}, {"id": "法约尔", "cn": "法约尔", "en": "亨利·法约尔", "col": "mgmt", "country": "法国", "born": 1841, "died": 1925, "school": "管理实践家管理学家、地质学家", "position": "“管理理论之父”，古典管理理论的主要代表人之一", "bio": "“管理理论之父”，古典管理理论的主要代表人之一", "avatar": "avatars/row_77.png", "tag": "管理心理", "theories": [{"t": "一、区分了“经营”与“管理”，并强调了管理的普遍性", "d": ""}, {"t": "二、管理的5项职能", "d": "管理活动具有计划、组织、指挥、协调和控制5项职能，并对之进行分析"}, {"t": "四、管理人员的素质与能力分析", "d": "亨利·法约尔认为管理人员应该具有特别的素质和能力：（1）身体条件，即健康、精力充沛、谈吐清楚；（2）智力条件，即具有理解和学习能力、判断能力和适应能力等；（3）精神条件，即有干劲、坚定不移、愿意承担责任、主动、忠诚、刚毅、有尊严；（4）通用知识，即一般地熟悉而不仅限于所从事职能的各方面知识；（5）专门知识，即任何职能所特有的知识，如技术、商业、财务、管理等专业知识；（6）经验，即从本职工作中获得的知识，就是把个人从工作中吸取的教训加以整理。"}], "experiment": {"title": "一、区分了“经营”与“管理”，并强调了管理的普遍性", "body": "一、区分了“经营”与“管理”，并强调了管理的普遍性"}}, {"id": "利维特", "cn": "利维特", "en": "哈罗德·利维特", "col": "mgmt", "country": "1922–2007", "school": "", "position": "管理心理学形成的主要标志-《管理心理学》出版", "bio": "管理心理学形成的主要标志-《管理心理学》出版", "avatar": "avatars/row_78.webp", "tag": "管理心理", "theories": [{"t": "利维特钻石模型(Leavitt's Diamond Model)", "d": "任何对组织的研究都会涉及到组织的五大基本要素：社会结构 (Structure)、技术 (Technology)、参与者 (People)、目标 (Task)和环境(Environment)，前四个因素构成组织的内部四要素，形成一个菱形，形似钻石，因而被称为钻石模型。"}], "experiment": {"title": "利维特钻石模型(Leavitt's Diamond Model)", "body": "利维特钻石模型(Leavitt's Diamond Model)\n任何对组织的研究都会涉及到组织的五大基本要素：社会结构 (Structure)、技术 (Technology)、参与者 (People)、目标 (Task)和环境(Environment)，前四个因素构成组织的内部四要素，形成一个菱形，形似钻石，因而被称为钻石模型。"}}, {"id": "麦克雷戈", "cn": "麦克雷戈", "en": "道格拉斯·麦格雷戈", "col": "mgmt", "country": "美国", "born": 1906, "died": 1964, "school": "人际关系学派最具有影响力的思想家之一", "position": "行为科学家 人性假设理论创始人，管理理论的奠基人之一，X-Y理论管理大师", "bio": "行为科学家\n人性假设理论创始人，管理理论的奠基人之一，X-Y理论管理大师", "avatar": "avatars/row_79.jpeg", "tag": "管理心理", "theories": [{"t": "X理论与Y理论的启示", "d": "了解员工需求：管理者应深入了解员工的需求和动机，根据员工的不同特点采取灵活的管理方式。\n激发员工潜能：通过提供具有挑战性的工作任务和广阔的发展空间，激发员工的内在动机和创造力。\n建立信任关系：管理者应与员工建立信任关系，尊重员工的意见和想法，鼓励员工参与决策和管理。\n注重员工成长：提供必要的培训和支持，帮助员工实现个人成长和职业发展。"}]}, {"id": "梅奥（梅约）", "cn": "梅奥（梅约）", "en": "乔治·埃尔顿·梅奥", "col": "mgmt", "country": "美国", "born": 1880, "died": 1949, "school": "早期的行为科学——人际关系学说的创始人", "position": "人际关系学说的建立 “社会人”假设", "bio": "人际关系学说的建立\n“社会人”假设", "avatar": "avatars/row_80.jpeg", "tag": "管理心理", "theories": [{"t": "霍桑实验", "d": "在人际关系学派以前，各种管理理论主要强调管理的科学性和严密性，轻视人的作用，把工人看作机器的附属品。梅奥学派则注重人的因素，研究人的个体行为和群体行为，强调满足职工的社会需求，而这些结论的重要依据来自著名的霍桑实验。\n霍桑实验是一项以科学管理的逻辑为基础的实验。从1924年开始到1932年结束，在将近8年的时间内，前后共进行过两个回合：第一个回合是从1924年11月至1927年5月，在美国国家科学委员会赞助下进行的；第二个回合是从1927年至1932年，由梅奥主持进行。整个实验前后经过了四个阶段。"}, {"t": "霍桑实验的研究结果否定了传统管理理论对于人的假设，表明了工人不是被动的，孤立的个体，他们的行为不仅仅受工资的刺激，影响生产效率最重要的因素不是待遇和工作条件，而是工作中的人际关系。", "d": "（1）人是“社会人”而不是“经济人”。梅奥认为，人们的行为并不单纯出自追求金钱的动机，还有社会方面的、心理方面的需要，即追求人与人之间的友情、安全感、归属感和受人尊敬等，而后者更为重要。\n（2）企业中存在着非正式组织。企业中除了存在着为了实现企业目标而明确规定各成员相互关系和职责范围的正式组织之外，还存在着非正式组织。这种非正式组织的作用在于维护其成员的共同利益，使之免受其内部个别成员的疏忽或外部人员的干涉所造成的损失。\n（3）新的领导能力在于提高工人的满意度。在决定劳动生产率的诸因素中，置于首位的因素是工人的满意度，而生产条件、工资报酬只是第二位的。职工的满意度越高，其士气就越高，从而产生效率就越高。高的满意度来源于工人个人需求的有效满足，不仅包括物质需求，还包括精神需求。"}], "experiment": {"title": "霍桑实验", "body": "霍桑实验\n在人际关系学派以前，各种管理理论主要强调管理的科学性和严密性，轻视人的作用，把工人看作机器的附属品。梅奥学派则注重人的因素，研究人的个体行为和群体行为，强调满足职工的社会需求，而这些结论的重要依据来自著名的霍桑实验。\n霍桑实验是一项以科学管理的逻辑为基础的实验。从1924年开始到1932年结束，在将近8年的时间内，前后共进行过两个回合：第一个回合是从1924年11月至1927年5月，在美国国家科学委员会赞助下进行的；第二个回合是从1927年至1932年，由梅奥主持进行。整个实验前后经过了四个阶段。"}}, {"id": "赫茨伯格", "cn": "赫茨伯格", "en": "弗雷德里克·赫茨伯格", "col": "mgmt", "country": "美国", "born": 1923, "died": 2000, "school": "心理学家、管理理论家、行为科学家", "position": "双因素理论的创始人", "bio": "双因素理论的创始人", "avatar": "avatars/row_81.jpeg", "tag": "管理心理", "theories": [{"t": "保健因素的满足对职工产生的效果类似于卫生保健对身体健康所起的作用。保健从人的环境中消除有害于健康的事物，它不能直接提高健康水平，但有预防疾病的效果；它不是治疗性的，而是预防性的。保健因素包括公司政策、管理措施、监督、人际关系、物质工作条件、工资、福利等。当这些因素恶化到人们认为可以接受的水平以下时，就会产生对工作的不满意。但是，当人们认为这些因素很好时，它只是消除了不满意，并不会导致积极的态度，这就形成了某种既不是满意、又不是不满意的中性状态。", "d": ""}], "experiment": {"title": "保健因素的满足对职工产生的效果类似于卫生保健对身体健康所起的作用。保健从人的环境中消除有害于健康的事物，它不能直接提高健康水平，但有预防疾病的效果；它不是治疗性的，而是预防性的。保健因素包括公司政策、", "body": "保健因素的满足对职工产生的效果类似于卫生保健对身体健康所起的作用。保健从人的环境中消除有害于健康的事物，它不能直接提高健康水平，但有预防疾病的效果；它不是治疗性的，而是预防性的。保健因素包括公司政策、管理措施、监督、人际关系、物质工作条件、工资、福利等。当这些因素恶化到人们认为可以接受的水平以下时，就会产生对工作的不满意。但是，当人们认为这些因素很好时，它只是消除了不满意，并不会导致积极的态度，这就形成了某种既不是满意、又不是不满意的中性状态。"}}, {"id": "亚当斯", "cn": "亚当斯", "en": "约翰·斯塔希·亚当斯", "col": "mgmt", "country": "美国", "born": 1925, "school": "心理学家、行为科学家", "position": "提出公平理论，又称社会比较理论，", "bio": "提出公平理论，又称社会比较理论，", "avatar": "avatars/row_82.jpeg", "tag": "管理心理", "theories": [{"t": "该理论是研究人的动机和知觉关系的一种激励理论，侧重于研究工资报酬分配的合理性、公平性及其对职工生产积极性的影响。", "d": ""}, {"t": "公平是激励的动力：亚当斯认为，人能否受到激励，不仅取决于他们得到了什么，还取决于他们所得与别人所得是否公平。即，员工会将自己获得的报酬（包括金钱、工作安排、获得的赏识等）与自己的投入（包括教育程度、所作努力、用于工作的时间、精力和其他无形损耗等）的比值，与他人或自己过去的比值进行比较，只有相等时，他才认为公平。", "d": "公平理论的模式（方程式）：Qp/Ip=Qo/Io。其中，Qp代表一个人对他所获报酬的感觉，Ip代表一个人对他所做投入的感觉，Qo代表这个人对某比较对象所获报酬的感觉，Io代表这个人对比较对象所做投入的感觉。"}, {"t": "横向比较：即个体将自己获得的报酬与投入的比值，与组织内其他人进行比较。当比值相等时，个体才会认为公平。", "d": "纵向比较：即个体将自己目前获得的报酬与投入的比值，与自己过去某一时期内的比值进行比较。当比值相等时，个体才会认为公平。"}], "experiment": {"title": "该理论是研究人的动机和知觉关系的一种激励理论，侧重于研究工资报酬分配的合理性、公平性及其对职工生产积极性的影响。", "body": "该理论是研究人的动机和知觉关系的一种激励理论，侧重于研究工资报酬分配的合理性、公平性及其对职工生产积极性的影响。"}}, {"id": "勒温", "cn": "勒温", "en": "库尔特·勒温", "col": "social", "country": "德裔美国", "born": 1890, "school": "心理学家", "position": "应用心理学创始人之一 实验社会心理学的先驱 “社会心理学之父”", "bio": "应用心理学创始人之一\n实验社会心理学的先驱\n“社会心理学之父”", "avatar": "avatars/row_83.jpeg", "tag": "社会心理", "theories": [{"t": "格式塔心理学：勒温起初属于行为主义心理学学派，后来由于与韦特海默和柯勒等共事，转而接受了格式塔心理学，并成为该学派的积极倡导者。", "d": ""}, {"t": "群体动力学：勒温是群体动力学的创始人，他试图用群体动力学理论来解决社会实际问题。他认为，团体的本质在于其各成员间的相互依赖，这种相互间的依赖关系决定着团体的特性。团体内存在着对抗和内聚的力量，两种力量时刻进行着斗争，一个良好的有生命力的团体必须要有较强的内聚性才能防止团体的分裂。", "d": ""}, {"t": "参与改变理论：勒温在社会心理学领域的另一重要贡献是参与改变理论。该理论认为，人们更容易接受自己参与制定的改变。他提出了一个三阶段的改变模型：解冻、改变、冻结。在解冻阶段，需要打破现有的平衡状态，为变革做好准备；在改变阶段，实施新的行为或状态，并提供必要的支持和培训；在冻结阶段，巩固新的行为或状态，使其成为新的平衡状态。这一理论在组织变革、教育改革等领域有着广泛的应用。", "d": ""}, {"t": "生活空间理论：这是勒温场动力理论的重要组成部分。该理论认为，个体的行为是由其所处的“生活空间”决定的。生活空间是一个包含所有可能影响个体行为的事物的区域，既包括个体内在的心理状态，也包括外在的环境因素。勒温用生活空间来解释个体行为的多样性和复杂性，认为行为是个体与其生活空间内各种因素相互作用的结果。", "d": ""}], "experiment": {"title": "格式塔心理学：勒温起初属于行为主义心理学学派，后来由于与韦特海默和柯勒等共事，转而接受了格式塔心理学，并成为该学派的积极倡导者。", "body": "格式塔心理学：勒温起初属于行为主义心理学学派，后来由于与韦特海默和柯勒等共事，转而接受了格式塔心理学，并成为该学派的积极倡导者。"}}, {"id": "闵斯特伯格", "cn": "闵斯特伯格", "en": "雨果·闵斯特伯格", "col": "mgmt", "country": "德裔美国", "born": 1863, "died": 1916, "school": "心理学家", "position": "应用心理学创始人， 工业心理学奠基人", "bio": "应用心理学创始人，\n工业心理学奠基人", "avatar": "avatars/row_84.png", "tag": "管理心理", "theories": [{"t": "工业心理学：闵斯特伯格是工业心理学的主要创始人。他提出了心理学在工业生产中应用的可能与方法，并强调了心理学对提高生产效率的意义。他的研究重点是如何根据个体的素质和心理特点将他们安置到最适合的工作岗位上，以及如何在特定的心理条件下让工人发挥最大的干劲和积极性。他的这些研究为工业心理学开辟了新的研究领域，并为后续的研究奠定了基础。", "d": ""}, {"t": "社会心理学：闵斯特伯格在社会心理学领域也从事实验团体心理学研究，促进了实验社会心理学的形成。他曾在报告、报纸和杂志中预示“世界政府与和平联盟”的最终失败，认为只有英国、德国和美国的联盟才会带来和平；他还预言禁酒会产生比酗酒所引起的更糟糕的问题，并揭露民间神秘主义者和神秘人物的伪装。", "d": ""}], "experiment": {"title": "工业心理学：闵斯特伯格是工业心理学的主要创始人。他提出了心理学在工业生产中应用的可能与方法，并强调了心理学对提高生产效率的意义。他的研究重点是如何根据个体的素质和心理特点将他们安置到最适合的工作岗位上", "body": "工业心理学：闵斯特伯格是工业心理学的主要创始人。他提出了心理学在工业生产中应用的可能与方法，并强调了心理学对提高生产效率的意义。他的研究重点是如何根据个体的素质和心理特点将他们安置到最适合的工作岗位上，以及如何在特定的心理条件下让工人发挥最大的干劲和积极性。他的这些研究为工业心理学开辟了新的研究领域，并为后续的研究奠定了基础。"}}, {"id": "塞利格曼", "cn": "塞利格曼", "en": "马丁·塞利格曼", "col": "positive", "country": "美国", "born": 1942, "school": "心理学家", "position": "积极心理学之父", "bio": "积极心理学之父", "avatar": "avatars/row_86.jpeg", "tag": "积极心理学", "th function syncBoardChrome(){
  const header = document.getElementById('colsHeader');
  const timeline = document.getElementById('timelineRail');
  const corner = document.getElementById('boardCorner');
  const headerWrap = document.getElementById('colsHeaderWrap');
  if(!boardScroll || !header || !timeline) return;
  const sl = boardScroll.scrollLeft;
  const st = boardScroll.scrollTop;
  const z = canvasZoom;
  const scale = z === 1 ? '' : ` scale(${z})`;
  header.style.transform = `translateX(${-sl}px)${scale}`;
  timeline.style.transform = `translateY(${-st}px)${scale}`;
  const headerH = Math.ceil(header.offsetHeight * z);
  if(corner) corner.style.minHeight = headerH + 'px';
  if(headerWrap) headerWrap.style.minHeight = headerH + 'px';
}

function applyCanvasZoom(){
  const board = document.getElementById('board');
  const boardFrame = document.getElementById('boardFrame');
  if(!board || !boardScaler || !boardCardsLayer) return;
  const baseW = parseFloat(boardScaler.dataset.baseW) || board.offsetWidth;
  const baseH = parseFloat(boardScaler.dataset.baseH) || board.offsetHeight;
  if(!baseW || !baseH) return;
  boardCardsLayer.style.transform = canvasZoom === 1 ? 'none' : `scale(${canvasZoom})`;
  boardCardsLayer.style.transformOrigin = '0 0';
  boardScaler.style.transform = 'none';
  boardScaler.style.width = Math.ceil(baseW * canvasZoom) + 'px';
  boardScaler.style.height = Math.ceil(baseH * canvasZoom) + 'px';
  const timelineW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--timeline-w')) || 160;
  const scaledTimelineW = Math.ceil(timelineW * canvasZoom);
  if(boardFrame){
    boardFrame.style.gridTemplateColumns = canvasZoom === 1
      ? ''
      : `${scaledTimelineW}px minmax(0, 1fr)`;
  }
  if(zoomSlider) zoomSlider.value = Math.round(canvasZoom * 100);
  if(zoomLabel) zoomLabel.textContent = Math.round(canvasZoom * 100) + '%';
  if(zoomOutBtn) zoomOutBtn.disabled = canvasZoom <= 0.505;
  if(zoomInBtn) zoomInBtn.disabled = canvasZoom >= 0.995;
  syncBoardChrome();
  updateViewportScrollbars();
  buildConnections();
  updateDetailPopBounds();
}

function setCanvasZoom(percent){
  canvasZoom = Math.max(0.5, Math.min(1, percent / 100));
  applyCanvasZoom();
}

function initZoomControl(){
  zoomSlider.addEventListener('input', e=> setCanvasZoom(+e.target.value));
  zoomInBtn.addEventListener('click', ()=> setCanvasZoom(+zoomSlider.value + 5));
  zoomOutBtn.addEventListener('click', ()=> setCanvasZoom(+zoomSlider.value - 5));
}
