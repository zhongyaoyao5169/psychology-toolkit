function updateDetailPopBounds(){
  const zoom = document.getElementById('zoomControl');
  const stage = document.getElementById('canvasStage');
  const headerWrap = document.getElementById('colsHeaderWrap');
  if(!zoom || !stage) return;
  const zr = zoom.getBoundingClientRect();
  const sr = stage.getBoundingClientRect();
  const hr = headerWrap ? headerWrap.getBoundingClientRect() : null;
  const bottomGap = Math.max(12, window.innerHeight - sr.bottom + 12);
  document.documentElement.style.setProperty('--detail-bottom', bottomGap + 'px');
  document.documentElement.style.setProperty('--detail-right', '8px');
  const schoolBottom = hr && hr.height > 0 ? hr.bottom : 0;
  const topMin = Math.max(zr.bottom, schoolBottom) + 8;
  document.documentElement.style.setProperty('--detail-top-min', topMin + 'px');
}

const boardViewport = document.getElementById('boardViewport');
const boardScroll = document.getElementById('boardScroll');
const canvasStage = document.getElementById('canvasStage');
const hScrollTrack = document.getElementById('hScrollTrack');
const vScrollTrack = document.getElementById('vScrollTrack');
const hScrollThumb = document.getElementById('hScrollThumb');
const vScrollThumb = document.getElementById('vScrollThumb');
let scrollHideTimer = null;

function isScrollDragging(){
  return hScrollThumb.classList.contains('dragging') || vScrollThumb.classList.contains('dragging');
}

function showScrollbars(){
  updateViewportScrollbars();
  if(!hScrollTrack.classList.contains('has-scroll') && !vScrollTrack.classList.contains('has-scroll')) return;
  canvasStage.classList.add('scroll-bars-visible');
  clearTimeout(scrollHideTimer);
  scrollHideTimer = setTimeout(()=>{
    if(isScrollDragging()) return;
    if(hScrollTrack.matches(':hover') || vScrollTrack.matches(':hover')) return;
    canvasStage.classList.remove('scroll-bars-visible');
  }, 800);
}

function updateViewportScrollbars(){
  if(!boardScroll) return;
  const maxX = Math.max(boardScroll.scrollWidth - boardScroll.clientWidth, 0);
  const maxY = Math.max(boardScroll.scrollHeight - boardScroll.clientHeight, 0);
  hScrollTrack.classList.toggle('has-scroll', maxX > 2);
  vScrollTrack.classList.toggle('has-scroll', maxY > 2);

  if(maxX > 2){
    const trackW = hScrollTrack.clientWidth || canvasStage.clientWidth;
    const thumbW = Math.max((boardScroll.clientWidth / boardScroll.scrollWidth) * trackW, 20);
    const left = maxX ? (boardScroll.scrollLeft / maxX) * (trackW - thumbW) : 0;
    hScrollThumb.style.width = thumbW + 'px';
    hScrollThumb.style.left = left + 'px';
  } else {
    hScrollThumb.style.width = hScrollThumb.style.left = '';
  }
  if(maxY > 2){
    const trackH = vScrollTrack.clientHeight || canvasStage.clientHeight;
    const thumbH = Math.max((boardScroll.clientHeight / boardScroll.scrollHeight) * trackH, 20);
    const top = maxY ? (boardScroll.scrollTop / maxY) * (trackH - thumbH) : 0;
    vScrollThumb.style.height = thumbH + 'px';
    vScrollThumb.style.top = top + 'px';
  } else {
    vScrollThumb.style.height = vScrollThumb.style.top = '';
  }
}

function bindAxisScroll(track, thumb, axis){
  let dragging = false, start = 0, startScroll = 0;
  const maxScroll = ()=> axis === 'x'
    ? Math.max(boardScroll.scrollWidth - boardScroll.clientWidth, 0)
    : Math.max(boardScroll.scrollHeight - boardScroll.clientHeight, 0);
  const trackSize = ()=> axis === 'x' ? track.clientWidth : track.clientHeight;
  const thumbSize = ()=> axis === 'x' ? thumb.offsetWidth : thumb.offsetHeight;

  thumb.addEventListener('mousedown', e=>{
    e.preventDefault(); e.stopPropagation();
    dragging = true; thumb.classList.add('dragging');
    showScrollbars();
    start = axis === 'x' ? e.clientX : e.clientY;
    startScroll = axis === 'x' ? boardScroll.scrollLeft : boardScroll.scrollTop;
  });
  track.addEventListener('mousedown', e=>{
    if(e.target === thumb) return;
    showScrollbars();
    const rect = track.getBoundingClientRect();
    const pos = axis === 'x' ? e.clientX - rect.left : e.clientY - rect.top;
    const ratio = Math.max(0, Math.min(1, (pos - thumbSize()/2) / Math.max(trackSize() - thumbSize(), 1)));
    if(axis === 'x') boardScroll.scrollLeft = ratio * maxScroll();
    else boardScroll.scrollTop = ratio * maxScroll();
    syncBoardChrome();
    updateViewportScrollbars();
  });
  track.addEventListener('mouseenter', ()=>{
    canvasStage.classList.add('scroll-bars-visible');
    clearTimeout(scrollHideTimer);
  });
  track.addEventListener('mouseleave', showScrollbars);
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    showScrollbars();
    const delta = (axis === 'x' ? e.clientX : e.clientY) - start;
    const span = Math.max(trackSize() - thumbSize(), 1);
    const next = startScroll + (delta / span) * maxScroll();
    if(axis === 'x') boardScroll.scrollLeft = next;
    else boardScroll.scrollTop = next;
    syncBoardChrome();
    updateViewportScrollbars();
  });
  window.addEventListener('mouseup', ()=>{
    if(!dragging) return;
    dragging = false; thumb.classList.remove('dragging');
    showScrollbars();
  });
}

let panning = false, panStart = null;
function endPan(){
  if(!panning) return;
  panning = false; panStart = null;
  boardViewport.classList.remove('panning', 'pan-ready');
}
function initCanvasPan(){
  boardViewport.addEventListener('contextmenu', e=> e.preventDefault());
  boardViewport.addEventListener('mousedown', e=>{
    if(e.button !== 2) return;
    if(e.target.closest('#zoomControl')) return;
    e.preventDefault();
    panning = true;
    panStart = {x:e.clientX, y:e.clientY, sl:boardScroll.scrollLeft, st:boardScroll.scrollTop};
    boardViewport.classList.add('pan-ready', 'panning');
    showScrollbars();
  });
  window.addEventListener('mousemove', e=>{
    if(!panning || !panStart) return;
    boardScroll.scrollLeft = panStart.sl - (e.clientX - panStart.x);
    boardScroll.scrollTop = panStart.st - (e.clientY - panStart.y);
    syncBoardChrome();
    updateViewportScrollbars();
    showScrollbars();
  });
  window.addEventListener('mouseup', endPan);
  boardScroll.addEventListener('wheel', showScrollbars, {passive:true});
  boardScroll.addEventListener('scroll', ()=>{ syncBoardChrome(); updateViewportScrollbars(); showScrollbars(); }, {passive:true});
  boardViewport.addEventListener('wheel', e=>{
    if(e.target.closest('#zoomControl') || !boardScroll) return;
    if(e.target.closest('.board-scroll')) return;
    boardScroll.scrollLeft += e.deltaX;
    boardScroll.scrollTop += e.deltaY;
    syncBoardChrome();
    updateViewportScrollbars();
    showScrollbars();
  }, {passive:true});
  bindAxisScroll(hScrollTrack, hScrollThumb, 'x');
  bindAxisScroll(vScrollTrack, vScrollThumb, 'y');
}

function bindPerspChips(container){
  container.querySelectorAll('.p-chip').forEach(chip=>{
    chip.addEventListener('click', ()=>{
      const k = chip.dataset.key;
      if(activeCols.has(k)) activeCols.delete(k); else activeCols.add(k);
      if(!activeCols.size) activeCols.add(k);
      if(!chip.classList.contains('school') && !dirsExpanded){
        dirsExpanded = true;
        updateDirPanel();
      }
      rebuild();
    });
  });
}

function updateDirPanel(){
  const panel = document.getElementById('perspDirections');
  const toggle = document.getElementById('dirToggle');
  panel.classList.toggle('expanded', dirsExpanded);
  toggle.classList.toggle('expanded', dirsExpanded);
  const activeDir = DIRECTION_KEYS.filter(k=>activeCols.has(k)).length;
  toggle.innerHTML = `研究方向 <span class="cnt">${activeDir}/${DIRECTION_KEYS.length}</span> <span class="arrow">▾</span>`;
  updateHeaderHeight();
}

function setCols(keys, selected){
  keys.forEach(k=> selected ? activeCols.add(k) : activeCols.delete(k));
  rebuild();
}

function buildPerspBar(){
  const schoolBar = document.getElementById('perspSchools');
  const dirBar = document.getElementById('perspDirections');
  const renderChip = c=>{
    const n = peopleByCol(c.key).length;
    const kind = c.isSchool ? 'school' : 'direction';
    return `<span class="p-chip ${kind}${activeCols.has(c.key)?' active':''}" data-key="${c.key}">${c.zh}<span class="cnt">${n}</span></span>`;
  };
  schoolBar.innerHTML = COLS.filter(c=>c.isSchool).map(renderChip).join('');
  dirBar.innerHTML = COLS.filter(c=>!c.isSchool).map(renderChip).join('');
  bindPerspChips(schoolBar);
  bindPerspChips(dirBar);
  updateDirPanel();
  document.getElementById('stats').textContent = `${PEOPLE.length} 位学者 · ${SCHOOL_KEYS.length} 大学派 · ${DIRECTION_KEYS.length} 个研究方向 · ${RELATIONS.length} 条关系`;
}

function matchSearch(p){
  if(!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  const hay = [p.cn,p.en,p.school,p.position,p.bio,p.tag,colMeta(p.col)?.zh,colMeta(p.col)?.full,...(p.theories||[]).map(t=>t.t+' '+t.d)].join(' ').toLowerCase();
  return hay.includes(q);
}

function layoutPeople(){
  const visibleCols = [...activeCols];
  const minYear = Math.min(...PEOPLE.filter(p=>p.born).map(p=>p.born), 1770);
  const maxYear = Math.max(...PEOPLE.filter(p=>p.born).map(p=>p.born), 2000);
  const yearSpan = maxYear - minYear || 1;
  const topPad = 8, usableHeight = 1400;

  PEOPLE.forEach(p=>{
    if(!p.born){ p._top = topPad + usableHeight; return; }
    p._idealTop = topPad + ((p.born - minYear)/yearSpan)*usableHeight;
  });

  visibleCols.forEach(key=>{
    const list = PEOPLE.filter(p=>p.col===key).sort((a,b)=>(a._idealTop||0)-(b._idealTop||0));
    let lastBottom = -Infinity;
    list.forEach(p=>{
      if(!matchSearch(p)){ p._top = null; return; }
      let top = Math.max(p._idealTop||topPad, lastBottom + 10);
      p._top = top; lastBottom = top + ROW_HEIGHT;
    });
  });
  return {minYear,maxYear,yearSpan,topPad,usableHeight,visibleCols};
}

function rebuild(){
  buildPerspBar();
  const board = document.getElementById('board');
  const cardsLayer = document.getElementById('boardCardsLayer');
  const timeline = document.getElementById('timelineRail');
  const header = document.getElementById('colsHeader');
  if(cardsLayer) cardsLayer.querySelectorAll('.person').forEach(el=>el.remove());
  timeline.innerHTML = '';
  header.innerHTML = '';
  document.getElementById('connSvg').innerHTML = '';

  const {minYear,maxYear,yearSpan,topPad,usableHeight,visibleCols} = layoutPeople();
  const colW = 240, gap = 12, timelineW = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--timeline-w')) || 160;
  header.style.gridTemplateColumns = visibleCols.map(()=>`var(--col-w)`).join(' ');
  header.style.gap = gap+'px';

  visibleCols.forEach(key=>{
    const c = colMeta(key);
    const h = document.createElement('div');
    h.className = 'col-head';
    h.innerHTML = `<div class="zh">${c.zh}</div><div class="en">${c.en}</div>`;
    header.appendChild(h);
  });

  const boardWidth = visibleCols.length * (colW + gap);
  board.style.width = boardWidth + 'px';
  header.style.width = boardWidth + 'px';

  ERA_MARKERS.forEach(m=>{
    if(m.year < minYear-10 || m.year > maxYear+10) return;
    const top = topPad + ((m.year-minYear)/yearSpan)*usableHeight;
    const marker = document.createElement('div');
    marker.className = 'era-marker';
    marker.style.top = top + 'px';
    marker.innerHTML = `<span class="year">${m.year}</span><span class="label">✨ ${m.label}</span>`;
    timeline.appendChild(marker);
  });

  let anyVisible = false;
  PEOPLE.forEach(p=>{
    if(!visibleCols.includes(p.col) || p._top==null) return;
    anyVisible = true;
    const card = document.createElement('div');
    card.className = 'person';
    card.id = 'person-'+p.id;
    card.dataset.id = p.id;
    card.style.cssText = `position:absolute;left:${visibleCols.indexOf(p.col)*(colW+gap)}px;top:${p._top}px`;
    const av = p.avatar ? `<img class="avatar" src="${p.avatar}" alt="${p.cn}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'avatar',textContent:'${p.cn[0]}'}))">` : `<div class="avatar">${p.cn[0]}</div>`;
    const years = p.born ? `${p.born}${p.died?'–'+p.died:''}` : '';
    const tagHtml = p.tag ? `<div class="dir-tag">${p.tag}</div>` : '';
    card.innerHTML = `${av}<div><div class="name-cn">${p.cn} <span class="name-meta">${years}</span></div><div class="name-en">${p.en||''}</div>${tagHtml}</div>`;
    card.addEventListener('click', e=>{ e.stopPropagation(); openPanel(p.id); });
    cardsLayer.appendChild(card);
  });

  const maxBottom = Math.max(...PEOPLE.filter(p=>visibleCols.includes(p.col)&&p._top!=null).map(p=>p._top+ROW_HEIGHT), 400);
  const boardHeight = maxBottom + 40;
  board.style.height = boardHeight + 'px';
  if(cardsLayer){
    cardsLayer.style.width = boardWidth + 'px';
    cardsLayer.style.height = boardHeight + 'px';
  }
  timeline.style.height = boardHeight + 'px';
  document.getElementById('emptyState').style.display = anyVisible ? 'none' : 'block';

  if(activePersonId) closePanel();
  requestAnimationFrame(()=>{
    boardScaler.dataset.baseW = board.offsetWidth;
    boardScaler.dataset.baseH = board.offsetHeight;
    applyCanvasZoom();
    syncBoardChrome();
    refreshHighlights();
    updateHeaderHeight();
    requestAnimationFrame(updateViewportScrollbars);
  });
}

function getCenter(id, zoom = canvasZoom){
  const el = document.getElementById('person-'+id);
  if(!el) return null;
  return {
    x: (el.offsetLeft + el.offsetWidth / 2) * zoom,
    y: (el.offsetTop + el.offsetHeight / 2) * zoom,
  };
}

function buildConnections(){
  const svg = document.getElementById('connSvg');
  const board = document.getElementById('board');
  const zoom = canvasZoom;
  const w = board.offsetWidth * zoom;
  const h = board.offsetHeight * zoom;
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.style.width = w + 'px';
  svg.style.height = h + 'px';
  svg.innerHTML = '';
  RELATIONS.forEach(rel=>{
    const a = getCenter(rel.from, zoom), b = getCenter(rel.to, zoom);
    if(!a||!b) return;
    const dx=b.x-a.x, dy=b.y-a.y;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M ${a.x} ${a.y} C ${a.x+dx*.25} ${a.y+dy*.1}, ${a.x+dx*.75} ${a.y+dy*.9}, ${b.x} ${b.y}`);
    path.setAttribute('stroke', REL_COLORS[rel.type]);
    path.dataset.from = rel.from; path.dataset.to = rel.to; path.dataset.type = rel.type;
    svg.appendChild(path);
  });
  refreshHighlights();
}

function refreshHighlights(){
  document.querySelectorAll('#connSvg path').forEach(path=>{
    const show = (!activeRelFilter || path.dataset.type===activeRelFilter) && (!activePersonId || path.dataset.from===activePersonId || path.dataset.to===activePersonId);
    if(!activePersonId && !activeRelFilter){
      path.classList.toggle('visible', showAllConnections);
      path.classList.remove('dimmed');
    } else {
      path.classList.toggle('visible', show);
      path.classList.toggle('dimmed', !show);
    }
  });
  const connected = new Set();
  if(activePersonId){
    connected.add(activePersonId);
    RELATIONS.forEach(r=>{
      if(activeRelFilter && r.type!==activeRelFilter) return;
      if(r.from===activePersonId) connected.add(r.to);
      if(r.to===activePersonId) connected.add(r.from);
    });
  }
  document.querySelectorAll('.person').forEach(card=>{
    const id = card.dataset.id;
    card.classList.toggle('selected', id===activePersonId);
    if(activePersonId){
      card.classList.toggle('dimmed', !connected.has(id));
      card.classList.toggle('highlighted', connected.has(id) && id!==activePersonId);
    } else {
      card.classList.remove('dimmed','highlighted');
    }
  });
}

function showDetailPop(){
  updateDetailPopBounds();
  const pop = document.getElementById('detailPop');
  pop.classList.add('show');
  requestAnimationFrame(()=>{
    const body = document.getElementById('detailPopBody');
    if(body) body.scrollTop = 0;
  });
}

function openPanel(id){
  const p = PEOPLE.find(x=>x.id===id); if(!p) return;
  if(!document.getElementById('person-'+id)) return;
  activePersonId = id; refreshHighlights();
  const c = colMeta(p.col);
  const panelTag = p.isSchool
    ? `<div class="panel-tag school">${c.full||c.zh}</div>`
    : `<div class="panel-tag direction">${p.tag||c.zh}</div>`;
  const rels = RELATIONS.filter(r=>r.from===id||r.to===id).map(r=>{
    const other = PEOPLE.find(x=>x.id===(r.from===id?r.to:r.from));
    return {...r, otherName:other?.cn||'?', direction: r.from===id?`→ ${other?.cn}`:`← ${other?.cn}`, otherId: other?.id};
  });
  const years = p.born ? `${p.born}年${p.died?' – '+p.died+'年':''}` : '';
  const sections = [
    `<div class="panel-section"><div class="label">🏆 时代定位</div><div class="position">${p.position||p.bio||''}</div></div>`,
    p.bio && p.bio !== (p.position||'') ? `<div class="panel-section"><div class="label">📋 简介</div><div class="body-text">${p.bio}</div></div>` : '',
    (p.theories&&p.theories.length) ? `<div class="panel-section"><div class="label">✨ 核心理论</div><ul class="theory-list">${p.theories.slice(0,5).map(t=>`<li><b>${t.t}</b>${t.d?'<br>'+t.d:''}</li>`).join('')}</ul></div>` : '',
    p.experiment ? `<div class="panel-section"><div class="label">📖 代表实验/著作</div><div class="body-text"><b>${p.experiment.title}</b><br><br>${p.experiment.body}</div></div>` : '',
    rels.length ? `<div class="panel-section"><div class="label">🔗 学术脉络</div><div class="relations">${rels.map(r=>`<div class="relation-row" data-goto="${r.otherId}"><span class="tag ${r.type}">${REL_TAG[r.type]}</span><span>${r.direction}：${r.label} <span style="color:var(--muted);font-size:10px">${REL_SRC[r.source]||''}</span></span></div>`).join('')}</div></div>` : ''
  ].filter(Boolean).join('');
  document.getElementById('detailPopContent').innerHTML = `
    <div class="detail-pop-layout">
      <div class="detail-pop-identity">
        ${p.avatar?`<img class="panel-photo" src="${p.avatar}" alt="${p.cn}">`:''}
        ${panelTag}
      </div>
      <div class="detail-pop-title">
        <h2>${p.cn}</h2>
        <div class="meta">${(p.en||'').toUpperCase()}${years?' · '+years:''}${p.country?' · '+p.country:''}${p.school?' · '+p.school:''}</div>
      </div>
      ${sections}
    </div>`;
  document.querySelectorAll('#detailPopContent .relation-row[data-goto]').forEach(row=>{
    row.addEventListener('click', e=>{ e.stopPropagation(); openPanel(row.dataset.goto); });
  });
  showDetailPop();
}

function closePanel(){
  document.getElementById('detailPop').classList.remove('show');
  activePersonId = null; refreshHighlights();
}

document.getElementById('filterAll').addEventListener('click', e=>{
  showAllConnections = !showAllConnections; activeRelFilter = null;
  closePanel();
  document.querySelectorAll('.legend .item').forEach(i=>i.classList.remove('dim'));
  e.target.classList.toggle('inactive', !showAllConnections);
  refreshHighlights();
});
document.querySelectorAll('.legend .item').forEach(item=>{
  item.addEventListener('click', ()=>{
    const rel = item.dataset.rel;
    activeRelFilter = activeRelFilter===rel ? null : rel;
    document.querySelectorAll('.legend .item').forEach(i=>i.classList.toggle('dim', activeRelFilter && i.dataset.rel!==activeRelFilter));
    showAllConnections = true;
    document.getElementById('filterAll').classList.add('inactive');
    refreshHighlights();
  });
});
document.getElementById('detailPop').addEventListener('wheel', e=> e.stopPropagation(), {passive:true});
document.getElementById('detailPopBody').addEventListener('wheel', e=> e.stopPropagation(), {passive:true});
document.getElementById('detailPopClose').addEventListener('click', e=>{ e.stopPropagation(); closePanel(); });
document.getElementById('detailPop').addEventListener('click', e=> e.stopPropagation());
document.addEventListener('click', e=>{
  if(!activePersonId) return;
  if(e.target.closest('#detailPop') || e.target.closest('.person') || e.target.closest('#zoomControl')) return;
  closePanel();
});
document.getElementById('searchInput').addEventListener('input', e=>{ searchQuery = e.target.value.trim(); rebuild(); });
document.getElementById('dirToggle').addEventListener('click', ()=>{ dirsExpanded = !dirsExpanded; updateDirPanel(); });
document.getElementById('schoolSelectAll').addEventListener('click', ()=> setCols(SCHOOL_KEYS, true));
document.getElementById('schoolClearAll').addEventListener('click', ()=> setCols(SCHOOL_KEYS, false));
document.getElementById('dirSelectAll').addEventListener('click', ()=>{ dirsExpanded = true; setCols(DIRECTION_KEYS, true); });
document.getElementById('dirClearAll').addEventListener('click', ()=> setCols(DIRECTION_KEYS, false));
document.getElementById('btnAllPersp').addEventListener('click', ()=>{
  activeCols = new Set(COLS.map(c=>c.key));
  dirsExpanded = true;
  rebuild();
});
document.getElementById('btnDefault').addEventListener('click', ()=>{
  activeCols = new Set(DEFAULT_COLS);
  dirsExpanded = false;
  rebuild();
});
window.addEventListener('resize', ()=>{ applyCanvasZoom(); updateHeaderHeight(); });

updateHeaderHeight();
initZoomControl();
initCanvasPan();
rebuild();
window.addEventListener('load', ()=>{ updateHeaderHeight(); updateViewportScrollbars(); });
</script>
